<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#F0EFF4" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Entrar · Eternity Academy</title>
  <link rel="icon" type="image/png" href="/medias/eternityfavicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:   #0F1629;
      --purple: #7022BB;
      --dp:     #5B18A0;
      --surface:#F0EFF4;
      --white:  #FFFFFF;
      --text:   #111827;
      --muted:  #6B7280;
      --border: #D1D5DB;
      --font:   'Red Hat Display', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--surface);
      color: var(--text);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Background decoration ── */
    .bg-deco {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }
    .bg-deco::before {
      content: '';
      position: absolute;
      top: -120px; right: -120px;
      width: 480px; height: 480px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(112,34,187,0.09) 0%, transparent 70%);
      filter: blur(60px);
    }
    .bg-deco::after {
      content: '';
      position: absolute;
      bottom: -80px; left: -80px;
      width: 380px; height: 380px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(15,22,41,0.06) 0%, transparent 70%);
      filter: blur(50px);
    }

    /* ── Page layout ── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
    }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 480px;
      background: var(--white);
      border-radius: 24px;
      padding: 44px 44px 40px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.04), 0 12px 40px rgba(0,0,0,0.08);
      animation: fadeUp 0.45s ease both;
    }

    /* ── Logo ── */
    .logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 32px;
    }
    .logo-wrap img {
      height: 42px;
      width: auto;
      display: block;
    }

    /* ── Heading ── */
    .heading {
      margin-bottom: 32px;
    }
    .heading h1 {
      font-size: 26px;
      font-weight: 900;
      color: var(--navy);
      letter-spacing: -0.4px;
      line-height: 1.2;
      margin-bottom: 6px;
    }

    /* ── Fields ── */
    .field { margin-bottom: 16px; }

    .field-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 7px;
    }

    .input-wrap { position: relative; }

    .ea-input {
      width: 100%;
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      color: var(--text);
      font-size: 15px;
      font-family: var(--font);
      font-weight: 500;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }
    .ea-input::placeholder { color: #9CA3AF; }
    .ea-input:focus {
      border-color: var(--navy);
      box-shadow: 0 0 0 3px rgba(15,22,41,0.08);
    }
    .ea-input.pw { padding-right: 50px; }

    /* eye toggle */
    .pw-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #9CA3AF;
      display: flex;
      align-items: center;
      padding: 4px;
      transition: color 0.2s;
    }
    .pw-toggle:hover { color: var(--navy); }
    .pw-toggle svg {
      width: 17px; height: 17px;
      fill: none; stroke: currentColor;
      stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
    }

    /* ── Forgot ── */
    .forgot-row {
      text-align: right;
      margin-top: 6px;
      margin-bottom: 24px;
    }
    .ea-link {
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
      cursor: pointer;
    }
    .ea-link:hover { color: var(--navy); }

    /* ── Button ── */
    .ea-btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 12px;
      font-family: var(--font);
      font-weight: 800;
      font-size: 15px;
      letter-spacing: 0.5px;
      cursor: pointer;
      background: var(--navy);
      color: #FFFFFF;
      transition: background 0.18s, transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 16px rgba(15,22,41,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .ea-btn:hover:not(:disabled) {
      background: #1a2540;
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(15,22,41,0.28);
    }
    .ea-btn:active:not(:disabled) { transform: translateY(0); }
    .ea-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    /* spinner */
    .spinner {
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: #FFFFFF;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      display: none;
    }
    .ea-btn.loading .btn-label { display: none; }
    .ea-btn.loading .spinner   { display: block; }

    /* ── Error banner ── */
    .error-banner {
      display: none;
      align-items: center;
      gap: 10px;
      background: rgba(239,68,68,0.06);
      border: 1px solid rgba(239,68,68,0.18);
      border-radius: 10px;
      padding: 11px 14px;
      margin-bottom: 16px;
      font-size: 13px;
      color: #DC2626;
      font-weight: 500;
    }
    .error-banner svg { flex-shrink: 0; }

    /* ── Footer ── */
    .card-footer {
      text-align: center;
      margin-top: 28px;
      font-size: 10px;
      color: #9CA3AF;
      letter-spacing: 0.8px;
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Mobile ── */
    @media (max-width: 540px) {
      .card { padding: 36px 24px 32px; border-radius: 20px; }
      .heading h1 { font-size: 22px; }
      .ea-input { font-size: 16px; }
    }
  </style>
</head>

<body>
<div class="bg-deco" aria-hidden="true"></div>

<div class="page">
  <div class="card">

    <!-- Logo -->
    <div class="logo-wrap">
      <img src="/medias/eahorizontalglow.png" alt="Eternity Academy" />
    </div>

    <!-- Heading -->
    <div class="heading">
      <h1>Acesse sua conta Eternity</h1>
    </div>

    <form id="loginForm" novalidate>

      <!-- Error banner -->
      <div id="errorBanner" class="error-banner" role="alert">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="errorText"></span>
      </div>

      <!-- Email -->
      <div class="field">
        <label class="field-label" for="email">E-mail</label>
        <input
          class="ea-input"
          type="email"
          id="email"
          name="email"
          placeholder="seuemail@empresa.com"
          autocomplete="email"
          inputmode="email"
          required
        />
      </div>

      <!-- Senha -->
      <div class="field">
        <label class="field-label" for="password">Senha</label>
        <div class="input-wrap">
          <input
            class="ea-input pw"
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
          <button type="button" class="pw-toggle" id="pwToggle" aria-label="Mostrar senha">
            <svg id="eyeOpen" viewBox="0 0 24 24">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg id="eyeOff" viewBox="0 0 24 24" style="display:none">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Forgot -->
      <div class="forgot-row">
        <a class="ea-link" href="#" id="forgotLink">Esqueci minha senha</a>
      </div>

      <!-- Submit -->
      <button type="submit" class="ea-btn" id="btnSubmit">
        <span class="btn-label">Entrar</span>
        <div class="spinner" aria-hidden="true"></div>
      </button>

    </form>

    <p class="card-footer">© 2026 ETERNITY HOLDING CO. — TODOS OS DIREITOS RESERVADOS</p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script>
(function () {
  'use strict';

  var SUPABASE_URL  = 'https://subsagwkktjjujdfpavf.supabase.co';
  var SUPABASE_ANON = 'sb_publishable_Ln7neAZZMFVZ_yHU64DHHg_QV4ubdDy';

  var ADMIN_EMAIL          = 'academy@eternityholding.com';
  var REDIRECT_AFTER_LOGIN = '/dashboard/index.html';
  var REDIRECT_ADMIN       = '/admin/index.html';

  var sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  var form        = document.getElementById('loginForm');
  var emailEl     = document.getElementById('email');
  var passEl      = document.getElementById('password');
  var pwToggle    = document.getElementById('pwToggle');
  var eyeOpen     = document.getElementById('eyeOpen');
  var eyeOff      = document.getElementById('eyeOff');
  var btnSubmit   = document.getElementById('btnSubmit');
  var errorBanner = document.getElementById('errorBanner');
  var errorText   = document.getElementById('errorText');

  /* Se já está logado → redireciona */
  sb.auth.getSession().then(function (result) {
    if (result.data && result.data.session) {
      var dest = result.data.session.user.email === ADMIN_EMAIL ? REDIRECT_ADMIN : REDIRECT_AFTER_LOGIN;
      window.location.replace(dest);
    }
  });

  function setLoading(on) {
    btnSubmit.disabled = on;
    if (on) btnSubmit.classList.add('loading');
    else     btnSubmit.classList.remove('loading');
  }

  function showError(msg, success) {
    errorText.textContent = msg;
    errorBanner.style.display = 'flex';
    if (success) {
      errorBanner.style.background = 'rgba(34,197,94,0.06)';
      errorBanner.style.borderColor = 'rgba(34,197,94,0.18)';
      errorBanner.style.color = '#16a34a';
    } else {
      errorBanner.style.background = '';
      errorBanner.style.borderColor = '';
      errorBanner.style.color = '';
    }
  }

  function hideError() { errorBanner.style.display = 'none'; }

  pwToggle.addEventListener('click', function () {
    var hide = passEl.type === 'password';
    passEl.type = hide ? 'text' : 'password';
    eyeOpen.style.display = hide ? 'none'  : 'block';
    eyeOff.style.display  = hide ? 'block' : 'none';
    pwToggle.setAttribute('aria-label', hide ? 'Ocultar senha' : 'Mostrar senha');
  });

  emailEl.addEventListener('input', hideError);
  passEl.addEventListener('input', hideError);

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    hideError();

    var email    = emailEl.value.trim();
    var password = passEl.value;

    if (!email || !password) {
      showError('Preencha e-mail e senha para continuar.');
      return;
    }

    setLoading(true);

    sb.auth.signInWithPassword({ email: email, password: password })
      .then(function (result) {
        if (result.error) {
          setLoading(false);
          var msg = result.error.message;
          if (msg === 'Invalid login credentials') {
            showError('E-mail ou senha incorretos.');
          } else if (msg === 'Email not confirmed') {
            showError('Confirme seu e-mail antes de entrar.');
          } else {
            showError(msg);
          }
        } else {
          var dest = email.trim().toLowerCase() === ADMIN_EMAIL ? REDIRECT_ADMIN : REDIRECT_AFTER_LOGIN;
          window.location.href = dest;
        }
      })
      .catch(function () {
        setLoading(false);
        showError('Erro de conexão. Tente novamente.');
      });
  });

  document.getElementById('forgotLink').addEventListener('click', function (e) {
    e.preventDefault();
    var email = emailEl.value.trim();

    if (!email) {
      emailEl.focus();
      showError('Digite seu e-mail acima para recuperar a senha.');
      return;
    }

    hideError();
    setLoading(true);

    sb.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/nova-senha'
    }).then(function () {
      setLoading(false);
      showError('Link de recuperação enviado para ' + email, true);
    }).catch(function () {
      setLoading(false);
      showError('Não foi possível enviar o link. Tente novamente.');
    });
  });

}());
</script>
</body>
</html>
