    <div style="position:relative;margin-bottom:16px">
      <svg style="position:absolute;left:12px;top:50%;transform:translateY(-50%);pointer-events:none" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="rgba(247,247,247,0.3)" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input data-input="search-collabs" class="inp" placeholder="Buscar por nome ou e-mail..." value="${search||''}" style="padding-left:36px">
    </div>

    <div class="fu1" style="display:flex;flex-direction:column;gap:10px">
      ${filtered.length === 0
        ? `<div class="card" style="padding:48px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;text-align:center">
             <div style="width:48px;height:48px;border-radius:14px;background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.2);display:flex;align-items:center;justify-content:center">
               ${ic('briefcase',22,'color:#f59e0b')}
             </div>
             <div style="font-weight:700;font-size:15px;color:#F7F7F7">${q ? 'Nenhum resultado para "'+search+'"' : 'Nenhum colaborador cadastrado'}</div>
             <div style="font-size:12px;color:rgba(247,247,247,.3);max-width:280px;line-height:1.6">${q ? '' : 'Adicione professores e funcionários para organizar a equipe da plataforma.'}</div>
           </div>`
        : filtered.map(c => `
            <div class="trow" style="gap:16px;flex-wrap:wrap">
              ${avatar(c.name, 40)}
              <div style="flex:1;min-width:0">
                <div style="font-weight:700;font-size:14px;color:#F7F7F7;margin-bottom:3px">${c.name}</div>
                <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
                  ${roleTag(c.role)}
                  ${c.email ? `<span style="font-size:11px;color:rgba(247,247,247,.35)">${c.email}</span>` : ''}
                </div>
                ${c.notes ? `<div style="font-size:11px;color:rgba(247,247,247,.3);margin-top:5px;line-height:1.5">${c.notes}</div>` : ''}
              </div>
              <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
                <button data-action="edit-collab" data-id="${c.id}" class="btn-ghost" style="font-size:11px;gap:5px">
                  ${ic('pencil',12)} Editar
                </button>
                <button data-action="delete-collab" data-id="${c.id}" class="btn-danger">
                  ${ic('trash-2',12)}
                </button>
              </div>
            </div>
          `).join('')}
    </div>
  </div>`;
}

/* ═══════════════════════════════════════════════════════════════════════════════
   PAGE: FEEDBACKS
═══════════════════════════════════════════════════════════════════════════════ */
function pageFeedbacks() {
  const { list, search, sort } = S.feedbacks;
  const q = search.toLowerCase();
  let filtered = list.filter(f => {
    if (!q) return true;
    return (f.student_name||'').toLowerCase().includes(q) || (f.body||'').toLowerCase().includes(q) || (f.call_title||'').toLowerCase().includes(q);
  });
  if (sort === 'az') filtered.sort((a,b) => (a.student_name||'').localeCompare(b.student_name||''));
  else if (sort === 'oldest') filtered.sort((a,b) => new Date(a.created_at) - new Date(b.created_at));
  else filtered.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));

  return `
  <div style="padding:28px 32px;max-width:800px">
    <div class="fu" style="margin-bottom:24px">
      <div class="lbl">FEEDBACKS</div>
      <h1 class="ph1">${list.length} Feedback${list.length!==1?'s':''}</h1>
      <p class="sub" style="margin-top:4px">Enviados pelos alunos após as calls</p>
    </div>

    <!-- Search + Sort -->
    <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap">
      <div style="flex:1;min-width:180px;position:relative">
        <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);pointer-events:none;color:rgba(247,247,247,.3)">${ic('search',14)}</span>
        <input data-action="feedback-search" class="inp" placeholder="Buscar por aluno ou conteúdo…" value="${search}" style="padding-left:34px"/>
      </div>
      <select data-action="feedback-sort" class="inp" style="max-width:170px">
        <option value="recent" ${sort==='recent'?'selected':''}>Mais recentes</option>
        <option value="oldest" ${sort==='oldest'?'selected':''}>Mais antigos</option>
        <option value="az" ${sort==='az'?'selected':''}>A – Z</option>
      </select>
    </div>

    <div class="fu1" style="display:flex;flex-direction:column;gap:12px">
      ${filtered.length === 0
        ? `<div class="trow" style="justify-content:center;color:rgba(247,247,247,.3);font-size:13px;gap:8px">${ic('message-square',16)} Nenhum feedback encontrado</div>`
        : filtered.map(f=>`
            <div class="card" style="padding:20px 22px">
              <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px">
                <div style="display:flex;align-items:center;gap:10px">
                  ${avatar(f.student_name || 'Aluno', 34)}
                  <div>
                    <div style="font-weight:700;font-size:13px;color:#F7F7F7">${f.student_name || 'Aluno'}</div>
                    <div style="font-size:10px;color:rgba(247,247,247,.3);margin-top:2px">${f.call_title || 'Call de Mentoria'} · ${fmtDateOnly(f.created_at)}</div>
                  </div>
                </div>
                <div style="display:flex;align-items:center;gap:3px">${starsHtml(f.rating)}</div>
              </div>
              ${f.body ? `<p style="font-size:13px;color:rgba(247,247,247,.65);line-height:1.7;border-top:1px solid var(--border);padding-top:12px">"${f.body}"</p>` : ''}
            </div>
          `).join('')}
    </div>
  </div>`;
}

function openModal(type, data={}) {
  S.modal = type;
  // reset state limpo
  if (type === 'new-student') S.newStudent = { name:'', email:'', pw:'', plan:'FAST', saving:false, err:'' };
  if (type === 'new-task')    S.newTask    = { studentId:'', callNum:'', title:'', note:'', saving:false, err:'' };
  if (type === 'new-collab')  S.collabForm = { id:'', name:'', email:'', pw:'', role:'', notes:'', saving:false, err:'' };
  if (type === 'edit-collab') S.collabForm = { ...data, pw:'', saving:false, err:'' };
  // garante que alunos estão carregados antes de abrir o modal de tarefa
  if (type === 'new-task' && !S.students.list.length) {
    S.students.loading = true;
    SB.from('student_profiles').select('*').order('created_at',{ascending:false})
      .then(({ data }) => { S.students.list = data || []; renderModal(); lucide.createIcons(); });
  }
  renderModal();
}

async function savePlan() {
  const { studentId, newPlan, saving } = S.editPlan;
  if (saving) return;
  S.editPlan.saving = true;
  S.editPlan.err    = '';
  renderModal();
  try {
    // 1. Update plan on student profile
    const { error: planErr } = await SB.from('student_profiles')
      .update({ plan: newPlan })
      .eq('id', studentId);
    if (planErr) throw new Error(planErr.message);

    // 2. Cancel all future (not yet done) bookings
    const now = new Date().toISOString();
    await SB.from('bookings')
      .update({ status: 'cancelled' })
      .eq('student_id', studentId)
      .gt('scheduled_at', now)
      .neq('status', 'cancelled');

    // 3. Update local list
    const st = S.students.list.find(s => s.id === studentId);
    if (st) st.plan = newPlan;

    closeModal();
    document.getElementById('pc').innerHTML = renderPage('students');
    lucide.createIcons();
  } catch(e) {
    S.editPlan.err    = 'Erro: ' + e.message;
    S.editPlan.saving = false;
    renderModal();
  }
}

/* ── Account save ───────────────────────────────────────────────── */
async function adminSaveCfg(id) {
  if (id === 'senha') {
    const pw  = document.getElementById('cfg-pw')?.value  || '';
    const pwc = document.getElementById('cfg-pwc')?.value || '';
    if (!pw || pw !== pwc || pw.length < 6) return;
    const { error } = await SB.auth.updateUser({ password: pw });
    if (error) { showToast('Erro: ' + error.message, 'error'); return; }
    S.cfg.pw = ''; S.cfg.pwConf = '';
  } else if (id === 'email') {
    const em = document.getElementById('cfg-email')?.value || '';
    if (!em) return;
    const { error } = await SB.auth.updateUser({ email: em });
    if (error) { showToast('Erro: ' + error.message, 'error'); return; }
  }
  S.cfg.saved = id;
  document.getElementById('pc').innerHTML = pageAccount();
  lucide.createIcons();
  setTimeout(() => { S.cfg.saved = ''; document.getElementById('pc').innerHTML = pageAccount(); lucide.createIcons(); }, 2200);
}

async function openStudentDetail(studentId) {
  const st = S.students.list.find(s => s.id === studentId);
  if (!st) return;

  // Show loading overlay immediately
  const mr = document.getElementById('mr');
  mr.innerHTML = `
  <div onclick="if(event.target===this)document.getElementById('mr').innerHTML=''" style="position:fixed;inset:0;background:rgba(5,5,8,0.85);display:flex;align-items:center;justify-content:center;z-index:300;backdrop-filter:blur(8px)">
    <div style="color:rgba(247,247,247,.4);font-size:13px">Carregando...</div>
  </div>`;

  const [bookRes, taskRes, fbRes, linkRes, growthRes, planHistRes] = await Promise.all([
    SB.from('bookings').select('id,scheduled_at,call_title,call_number,status').eq('student_id', studentId).order('scheduled_at'),
    SB.from('tasks').select('id,title,done,call_number,mentor_note,created_at').eq('student_id', studentId).order('created_at'),
    SB.from('feedbacks').select('id,student_id,call_title,rating,body,created_at').eq('student_id', studentId).order('created_at', {ascending:false}),
    SB.from('important_links').select('id,name,url,order').eq('student_id', studentId).order('order').order('created_at'),
    SB.from('weekly_growth').select('*').eq('student_id', studentId).order('week_number'),
    SB.from('plan_history').select('*').eq('student_id', studentId).order('created_at', {ascending:false}),
    loadFeedbacks(),
  ]);
  const planHistory = planHistRes.data || [];

  const calls = bookRes.data || [];
  const tasks = taskRes.data || [];
  let feedbacks = (fbRes.data && fbRes.data.length > 0)
    ? fbRes.data
    : S.feedbacks.list.filter(f => f.student_id === studentId);
  let studentLinks = linkRes.data || [];
  const growthData = growthRes.data || [];

  const PLAN_WEEKS = { FAST:4, GROWTH:12, ETERNITY:48 };
  const maxWeeks = PLAN_WEEKS[st.plan] || 12;
  const totalGross = growthData.reduce((s,g) => s + Number(g.gross_revenue||0), 0);
  const totalNet   = growthData.reduce((s,g) => s + Number(g.net_revenue||0), 0);
  const profitPct  = totalGross > 0 ? ((totalNet / totalGross) * 100).toFixed(1) : '—';
  const profitColor = profitPct === '—' ? 'rgba(247,247,247,.3)' : Number(profitPct) >= 30 ? '#22c55e' : Number(profitPct) >= 15 ? '#f59e0b' : '#f87171';

  const gCur = 'USD';
  const gFmt = (v) => 'US$ ' + (parseFloat(v)||0).toLocaleString('en-US',{minimumFractionDigits:2});

  const growthWeekMap = {};
  growthData.forEach(g => { growthWeekMap[g.week_number] = g; });
  const growthRows = [];
  for (let w = 1; w <= maxWeeks; w++) {
    const g = growthWeekMap[w];
    if (g) {
      const gr = Number(g.gross_revenue||0);
      const nr = Number(g.net_revenue||0);
      const pp = gr > 0 ? ((nr/gr)*100).toFixed(1) : '0.0';
      const pc = Number(pp)>=30?'#22c55e':Number(pp)>=15?'#f59e0b':'#f87171';
      growthRows.push(`<div style="display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:10px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06)">
        <div style="width:28px;height:28px;border-radius:8px;background:rgba(147,51,234,.12);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#9333ea;flex-shrink:0">${w}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:12px;font-weight:700;color:#F7F7F7">Semana ${w}</div>
          <div style="font-size:10px;color:rgba(247,247,247,.4);margin-top:2px">Bruto: ${gFmt(gr)} · Lucro: ${gFmt(nr)}</div>
        </div>
        <span style="font-size:11px;font-weight:800;color:${pc}">${pp}%</span>
      </div>`);
    } else {
      growthRows.push(`<div style="display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:10px;background:rgba(255,255,255,0.015);border:1px dashed rgba(255,255,255,0.06)">
        <div style="width:28px;height:28px;border-radius:8px;background:rgba(255,255,255,.04);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:rgba(247,247,247,.2);flex-shrink:0">${w}</div>
        <div style="flex:1;font-size:11px;color:rgba(247,247,247,.2)">Semana ${w} — não preenchida</div>
      </div>`);
    }
  }

  const now = new Date();
  const pad2 = n => String(n).padStart(2,'0');
  const fmt = dt => { const d=new Date(dt); return `${pad2(d.getDate())}/${pad2(d.getMonth()+1)}/${d.getFullYear()} ${pad2(d.getHours())}:${pad2(d.getMinutes())}`; };

async function addStudentLink(studentId) {
  const nameEl = document.getElementById('sl-name');
  const urlEl  = document.getElementById('sl-url');
  if (!nameEl || !urlEl) return;
  const name = nameEl.value.trim();
  const rawUrl = urlEl.value.trim();
  const url = /^https?:\/\//i.test(rawUrl) ? rawUrl : 'https://' + rawUrl;
  if (!name || !rawUrl) { nameEl.focus(); return; }
  nameEl.disabled = urlEl.disabled = true;
  const { data, error } = await SB.from('important_links')
    .insert({ student_id: studentId, name, url, order: 0 })
    .select().single();
  nameEl.disabled = urlEl.disabled = false;
  if (error || !data) return;
  nameEl.value = ''; urlEl.value = '';
  const list = document.getElementById('sl-list');
  const row = document.createElement('div');
  row.id = `sl-${data.id}`;
  row.style.cssText = 'display:grid;grid-template-columns:1fr 1fr 28px;gap:8px;align-items:center';
  row.innerHTML = `
    <div style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:9px 11px;font-size:12px;font-weight:600;color:#F7F7F7;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${data.name}</div>
    <a href="${/^https?:\/\//i.test(data.url)?data.url:'https://'+data.url}" target="_blank" rel="noopener" style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:9px 11px;font-size:11px;color:rgba(247,247,247,.5);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-decoration:none;display:block" title="${data.url}">${data.url}</a>
    <button onclick="deleteStudentLink('${studentId}','${data.id}')" style="background:none;border:none;cursor:pointer;color:rgba(247,247,247,.2);display:flex;align-items:center;justify-content:center;padding:4px;border-radius:6px;transition:all .15s;width:28px;height:28px" onmouseenter="this.style.background='rgba(248,113,113,.1)';this.style.color='#f87171'" onmouseleave="this.style.background='none';this.style.color='rgba(247,247,247,.2)'">
      <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
    </button>`;
  list.appendChild(row);
  // Oculta linha de adição se atingiu 8
  const count = list.querySelectorAll('[id^="sl-"]').length;
  if (count >= 8) {
    const addRow = document.getElementById('sl-add-row');
    const limitMsg = document.getElementById('sl-limit-msg');
    if (addRow) addRow.style.display = 'none';
    if (limitMsg) limitMsg.style.display = 'block';
  }
}

async function deleteStudentLink(studentId, linkId) {
  await SB.from('important_links').delete().eq('id', linkId).eq('student_id', studentId);
  const el = document.getElementById(`sl-${linkId}`);
  if (el) el.remove();
  // Reexibe linha de adição se estava oculta
  const addRow = document.getElementById('sl-add-row');
  const limitMsg = document.getElementById('sl-limit-msg');
  if (addRow) addRow.style.display = 'grid';
  if (limitMsg) limitMsg.style.display = 'none';
}

async function addStudentTask(studentId) {
  const titleEl = document.getElementById('nt-title');
  const noteEl  = document.getElementById('nt-note');
  const errEl   = document.getElementById('nt-err');
  const btn     = document.getElementById('nt-btn');

  const title = titleEl?.value?.trim();
  const note  = noteEl?.value?.trim() || null;

  if (!title) {
    errEl.textContent = 'Digite o título da tarefa.';
    errEl.style.display = 'block';
    titleEl?.focus();
    return;
  }
  errEl.style.display = 'none';

  if (btn) { btn.disabled = true; btn.textContent = 'Salvando...'; }

  const { data, error } = await SB.from('tasks').insert({
    student_id:  studentId,
    title,
    mentor_note: note,
    done:        false,
  }).select().single();

  if (btn) { btn.disabled = false; btn.innerHTML = '<svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Criar Tarefa'; }

  if (error || !data) {
    errEl.textContent = error?.message || 'Erro ao criar tarefa.';
    errEl.style.display = 'block';
    return;
  }

  if (titleEl) titleEl.value = '';
  if (noteEl)  noteEl.value  = '';

  const list = document.getElementById('nt-tasks-list');
  if (list) {
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;align-items:flex-start;gap:12px;padding:10px 14px;border-radius:10px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06)';
    row.innerHTML = `
      <div style="width:16px;height:16px;border-radius:5px;border:1.5px solid rgba(255,255,255,.2);background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px"></div>
      <div style="flex:1;min-width:0">
        <div style="font-size:12px;font-weight:700;color:#F7F7F7">${data.title}</div>
        ${data.mentor_note ? `<div style="font-size:10px;color:rgba(247,247,247,.35);margin-top:3px;font-style:italic">${data.mentor_note}</div>` : ''}
      </div>
      <span style="font-size:9px;font-weight:700;letter-spacing:1px;color:rgba(247,247,247,.3);flex-shrink:0">PENDENTE</span>`;
    list.prepend(row);
  }
}

async function addStudentCall(studentId) {
  const dateEl  = document.getElementById('nc-date');
  const timeEl  = document.getElementById('nc-time');
  const titleEl = document.getElementById('nc-title');
  const numEl   = document.getElementById('nc-num');
  const errEl   = document.getElementById('nc-err');
  const btn     = document.getElementById('nc-btn');

  const dateVal  = dateEl?.value?.trim();
  const timeVal  = timeEl?.value?.trim() || '09:00';
  const titleVal = titleEl?.value?.trim() || 'Call de Mentoria';
  const numVal   = numEl?.value ? parseInt(numEl.value) : null;

  if (!dateVal) {
    errEl.textContent = 'Selecione a data da call.';
    errEl.style.display = 'block';
    return;
  }
  errEl.style.display = 'none';

  const scheduledAt = `${dateVal}T${timeVal}:00-03:00`;
  if (btn) { btn.disabled = true; btn.textContent = 'Salvando...'; }

  const payload = { student_id: studentId, mentor_email: MENTOR_EMAIL, scheduled_at: scheduledAt, call_title: titleVal, status: 'confirmed' };
  if (numVal) payload.call_number = numVal;

  const { data, error } = await SB.from('bookings').insert(payload).select().single();

  if (btn) { btn.disabled = false; btn.innerHTML = '<svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Marcar Call'; }

  if (error || !data) {
    errEl.textContent = error?.message || 'Erro ao marcar call.';
    errEl.style.display = 'block';
    return;
  }

  if (dateEl)  dateEl.value  = '';
  if (timeEl)  timeEl.value  = '';
  if (titleEl) titleEl.value = '';
  if (numEl)   numEl.value   = '';

  const now2 = new Date();
  const d    = new Date(scheduledAt);
  const pad2 = n => String(n).padStart(2,'0');
  const fmtStr = `${pad2(d.getDate())}/${pad2(d.getMonth()+1)}/${d.getFullYear()} ${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
  const isPast = d < now2;
  const statusColor = isPast ? '#22c55e' : '#f59e0b';
  const statusLabel = isPast ? 'Concluída' : 'Agendada';

  const list = document.getElementById('nc-calls-list');
  if (list) {
    const row = document.createElement('div');
    row.id = `call-row-${data.id}`;
    row.style.cssText = 'display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:10px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06)';
    row.innerHTML = `
      <div style="width:7px;height:7px;border-radius:50%;background:${statusColor};flex-shrink:0"></div>
      <div style="flex:1;min-width:0">
        <div style="font-size:12px;font-weight:700;color:#F7F7F7">${titleVal}${numVal ? ` <span style="color:rgba(247,247,247,.35);font-weight:500">· #${numVal}</span>` : ''}</div>
        <div style="font-size:10px;color:rgba(247,247,247,.35);margin-top:2px">${fmtStr}</div>
      </div>
      <span style="font-size:9px;font-weight:700;letter-spacing:1px;color:${statusColor};flex-shrink:0">${statusLabel}</span>
      <button onclick="deleteStudentCall('${data.id}')" style="background:none;border:none;cursor:pointer;color:rgba(247,247,247,.18);padding:3px;border-radius:5px;display:flex;align-items:center;flex-shrink:0;transition:all .15s" onmouseenter="this.style.color='#f87171';this.style.background='rgba(248,113,113,.1)'" onmouseleave="this.style.color='rgba(247,247,247,.18)';this.style.background='none'">
        <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
      </button>`;
    list.prepend(row);
  }
  S.stats.loaded = false;
}

async function toggleStudentTask(taskId, done) {
  await SB.from('tasks').update({ done }).eq('id', taskId);
  const row = document.getElementById(`task-row-${taskId}`);
  if (!row) return;
  const check = row.querySelector('button:first-child');
  const title = row.querySelector('div > div:first-child');
  const badge = row.querySelector('span');
  if (check) {
    check.style.borderColor = done ? '#22c55e' : 'rgba(255,255,255,.25)';
    check.style.background  = done ? 'rgba(34,197,94,.15)' : 'transparent';
    check.innerHTML = done ? '<svg viewBox="0 0 24 24" width="9" height="9" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round"><path d="M4 12 9 17 19 7"/></svg>' : '';
    check.title = done ? 'Marcar pendente' : 'Marcar concluída';
    check.onclick = () => toggleStudentTask(taskId, !done);
  }
  if (title) { title.style.color = done ? 'rgba(247,247,247,.4)' : '#F7F7F7'; title.style.textDecoration = done ? 'line-through' : 'none'; }
  if (badge) { badge.textContent = done ? 'FEITA' : 'PENDENTE'; badge.style.color = done ? '#22c55e' : 'rgba(247,247,247,.3)'; }
  row.style.borderColor = done ? 'rgba(34,197,94,.12)' : 'rgba(255,255,255,0.06)';
}

  await SB.from('tasks').delete().eq('id', taskId);
  const el = document.getElementById(`task-row-${taskId}`);

}

async function deleteStudent(studentId) {
  const st = S.students.list.find(s => s.id === studentId);
  const name = st?.full_name || st?.email || 'este aluno';
  if (!confirm(`Excluir permanentemente ${name}?\n\nIsso remove todos os dados: calls, tarefas, feedbacks e links. Esta ação não pode ser desfeita.`)) return;
  await Promise.all([
    SB.from('bookings').delete().eq('student_id', studentId),
    SB.from('tasks').delete().eq('student_id', studentId),
    SB.from('important_links').delete().eq('student_id', studentId),
  ]);
  await SB.from('student_profiles').delete().eq('id', studentId);
  logAudit('delete_student', 'student', studentId, name, 'Aluno excluído permanentemente');
  S.students.list = S.students.list.filter(s => s.id !== studentId);
  S.stats.loaded = false;
  document.getElementById('mr').innerHTML = '';
  document.getElementById('pc').innerHTML = renderPage('students');
  lucide.createIcons();
}

async function expUpgradePlan(studentId) {
  const sel = document.getElementById('exp-upgrade-' + studentId);
  const newPlan = sel?.value;
  if (!newPlan) { showToast('Selecione um plano primeiro.', 'error'); return; }
  const st = S.students.list.find(s => s.id === studentId) || S.expirations.list.find(s => s.id === studentId);
  const name = st?.full_name || st?.email || 'Aluno';
  if (!confirm(`Fazer upgrade de ${name} para o plano ${newPlan}?`)) return;
  const { error } = await SB.from('student_profiles').update({ plan: newPlan }).eq('id', studentId);
  if (error) { showToast('Erro: ' + error.message, 'error'); return; }
  if (st) st.plan = newPlan;
  const stMain = S.students.list.find(s => s.id === studentId);
  if (stMain && stMain !== st) stMain.plan = newPlan;
  S.expirations.list = [];
  await loadExpirations();
  document.getElementById('pc').innerHTML = renderPage('expirations');
  lucide.createIcons();
  logAudit('upgrade_plan', 'student', studentId, name, `Plano alterado para ${newPlan}`);
  showToast(`${name} agora está no plano ${newPlan}!`, 'success');
}

function toggleStudentSelect(id) {
  const sel = S.students.selected;
  const idx = sel.indexOf(id);
  if (idx === -1) sel.push(id); else sel.splice(idx, 1);
  document.getElementById('pc').innerHTML = pageStudents();
  lucide.createIcons();
}

async function bulkMoveAlumni() {
  const sel = S.students.selected;
  if (!sel.length) return;
  if (!confirm(`Mover ${sel.length} aluno${sel.length>1?'s':''} para Antigos Alunos?`)) return;
  for (const id of sel) {
    await SB.from('student_profiles').update({ is_alumni: true }).eq('id', id);
    const idx = S.students.list.findIndex(s => s.id === id);
    if (idx !== -1) S.students.list[idx].is_alumni = true;
  }
  logAudit('bulk_move_alumni', 'student', null, null, `${sel.length} alunos movidos para Antigos`);

  document.getElementById('pc').innerHTML = pageStudents();
  lucide.createIcons();
  showToast(`${sel.length} aluno${sel.length>1?'s':''} movido${sel.length>1?'s':''} para Antigos.`, 'success');
}

async function bulkDeleteStudents() {
  const sel = S.students.selected;
  if (!sel.length) return;
  if (!confirm(`Excluir permanentemente ${sel.length} aluno${sel.length>1?'s':''}?\n\nEssa ação NÃO pode ser desfeita.`)) return;
  for (const id of sel) {
    await SB.from('student_profiles').delete().eq('id', id);
    S.students.list = S.students.list.filter(s => s.id !== id);
  }
  logAudit('bulk_delete', 'student', null, null, `${sel.length} alunos excluídos`);
  S.students.selected = [];
  document.getElementById('pc').innerHTML = pageStudents();
  lucide.createIcons();
  showToast(`${sel.length} aluno${sel.length>1?'s':''} excluído${sel.length>1?'s':''}.`, 'success');
}

async function moveToAlumni(studentId) {
  const st = S.students.list.find(s => s.id === studentId) || S.expirations.list.find(s => s.id === studentId);
  const name = st?.full_name || st?.email || 'este aluno';
  if (!confirm(`Mover ${name} para Antigos Alunos?\n\nO aluno continuará no sistema, mas será separado da lista de alunos ativos.`)) return;
  const { error } = await SB.from('student_profiles').update({ is_alumni: true }).eq('id', studentId);
  if (error) { showToast('Erro ao mover: ' + error.message, 'error'); return; }
  const idx = S.students.list.findIndex(s => s.id === studentId);
  if (idx !== -1) S.students.list[idx].is_alumni = true;
  document.getElementById('mr').innerHTML = '';

  logAudit('move_to_alumni', 'student', studentId, name, 'Movido para Antigos Alunos');

}

async function saveStudentEdit(studentId) {
  const nameEl         = document.getElementById('se-name');
  const emailEl        = document.getElementById('se-email');
  const phoneEl        = document.getElementById('se-phone');
  const supportPhoneEl = document.getElementById('se-support-phone');
  const planEl         = document.getElementById('se-plan');
  const expiresEl      = document.getElementById('se-expires');
  const errEl          = document.getElementById('se-err');
  const warnEl         = document.getElementById('se-plan-warn');
  const confirmEl      = document.getElementById('se-plan-confirm');

  if (!nameEl || !planEl) return;

  const st = S.students.list.find(s => s.id === studentId);
  if (!st) return;

  const newName         = (S._seNameTmp         !== undefined ? S._seNameTmp         : nameEl ? nameEl.value : '').trim();
  const newEmail        = (S._seEmailTmp        !== undefined ? S._seEmailTmp        : emailEl ? emailEl.value : '').trim();
  const newPhone        = (S._sePhoneTmp        !== undefined ? S._sePhoneTmp        : phoneEl ? phoneEl.value : '').trim();
  const newSupportPhone = (S._seSupportPhoneTmp !== undefined ? S._seSupportPhoneTmp : supportPhoneEl ? supportPhoneEl.value : '').trim();
  const newExpires      = (S._seExpiresTmp      !== undefined ? S._seExpiresTmp      : expiresEl ? expiresEl.value : '').trim();
  const newPlan         = planEl.value;
  const planChanged  = newPlan !== (st.plan || 'FAST');
  const emailChanged = newEmail && newEmail !== st.email;

  if (newPhone && !isValidPhone(newPhone)) {
    errEl.textContent = 'Número de telefone inválido. Use pelo menos 10 dígitos.';
    errEl.style.display = 'block';
    return;
  }
  if (newSupportPhone && !isValidPhone(newSupportPhone)) {
    errEl.textContent = 'Número de suporte inválido. Use pelo menos 10 dígitos.';
    errEl.style.display = 'block';
    return;
  }
  if (planChanged && warnEl && warnEl.style.display !== 'none' && !confirmEl.checked) {
    errEl.textContent = 'Confirme a mudança de plano antes de salvar.';
    errEl.style.display = 'block';
    return;
  }
  errEl.style.display = 'none';

  const saveBtn = document.getElementById('se-save-btn');
  if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = 'Salvando...'; }

  const updatePayload = { full_name: newName, plan: newPlan, phone: newPhone ? cleanPhone(newPhone) : null };
  if (newSupportPhone) updatePayload.support_phone = cleanPhone(newSupportPhone);
  updatePayload.plan_expires_at = newExpires || null;
  const { error } = await SB.from('student_profiles').update(updatePayload).eq('id', studentId);
  if (error) {
    errEl.textContent = error.message || 'Erro ao salvar.';
    errEl.style.display = 'block';
    if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = 'Salvar Alterações'; }
    return;
  }

  if (planChanged) {
    // Salvar histórico de plano
    await SB.from('plan_history').insert({
      student_id: studentId,
      previous_plan: st.plan || 'FAST',
      new_plan: newPlan,
      changed_by: S.user.id,
      changed_by_name: S.user.email,
    });
    // Delete ALL bookings (done + future) — UPDATE is blocked by RLS, only DELETE works
    await SB.from('bookings').delete().eq('student_id', studentId);
    // Delete all tasks
    await SB.from('tasks').delete().eq('student_id', studentId);
  }

  // Update local state
  const idx = S.students.list.findIndex(s => s.id === studentId);
  if (idx !== -1) {
    S.students.list[idx].full_name = newName;
    S.students.list[idx].email = newEmail || st.email;
    S.students.list[idx].phone = newPhone;
    S.students.list[idx].plan = newPlan;
    S.students.list[idx].support_phone = newSupportPhone || null;
    S.students.list[idx].plan_expires_at = newExpires || null;
  }
  S._seNameTmp = undefined;
  S._seEmailTmp = undefined;
  S._sePhoneTmp = undefined;
  S._seSupportPhoneTmp = undefined;
  S._seExpiresTmp = undefined;

  const changes = [];
  if (newName !== st.full_name) changes.push(`Nome: ${newName}`);
  if (planChanged) changes.push(`Plano: ${st.plan||'FAST'} → ${newPlan}`);
  if (newExpires !== (st.plan_expires_at||'').split('T')[0]) changes.push(`Expiração: ${newExpires||'removida'}`);
  if (changes.length) logAudit('edit_student', 'student', studentId, newName, changes.join('; '));

  openStudentDetail(studentId);
}

async function toggleSlot(dow, time) {
  const existing = S.avail.slots.find(s => s.day_of_week === +dow && (s.slot_time||'').slice(0,5) === time);
  if (existing) {
    const { error } = await SB.from('mentor_slots').update({ active: !existing.active }).eq('id', existing.id);
    if (!error) existing.active = !existing.active;
  } else {
    const { data, error } = await SB.from('mentor_slots').insert({
      mentor_email: MENTOR_EMAIL, day_of_week: +dow, slot_time: time, active: true,
    }).select().single();
    if (!error && data) S.avail.slots.push(data);
  }
  document.getElementById('pc').innerHTML = renderPage('availability');
  lucide.createIcons();
}

async function toggleBlock(dateStr) {
  const existing = S.avail.blocked.find(b => b.blocked_date === dateStr);
  if (existing) {
    const { error } = await SB.from('blocked_dates').delete().eq('id', existing.id);
    if (!error) S.avail.blocked = S.avail.blocked.filter(b => b.blocked_date !== dateStr);
  } else {
    const { data, error } = await SB.from('blocked_dates').insert({
      mentor_email: MENTOR_EMAIL, blocked_date: dateStr,
    }).select().single();
    if (!error && data) S.avail.blocked.push(data);
  }
  document.getElementById('pc').innerHTML = renderPage('availability');
  lucide.createIcons();
}

async function saveStudent() {
  const { name, email, pw, plan } = S.newStudent;
  if (!name || !email || !pw) return;
  S.newStudent.saving = true; S.newStudent.err = '';
  renderModal();
  try {
    const { data: { session } } = await SB.auth.getSession();
    const res = await fetch(`${SUPABASE_FN}/create-student`, {
      method: 'POST',
      headers: { 'Content-Type':'application/json', 'Authorization':`Bearer ${session.access_token}` },
      body: JSON.stringify({ email, password: pw, fullName: name, plan }),
    });
    const json = await res.json();
    if (json.error) throw new Error(json.error);
    S.newStudent = { name:'', email:'', pw:'', plan:'FAST', saving:false, err:'' };
    S.students.list = []; // force reload
    closeModal();
    await loadAndRender('students');
  } catch(e) {
    S.newStudent.saving = false;
    S.newStudent.err = e.message;
    renderModal();
  }
}

      .update({ support_phone: phone.trim() ? cleanPhone(phone) : null })
      .eq('id', studentId);
    if (error) throw new Error(error.message);
    // Update local list
    const st = S.students.list.find(s => s.id === studentId);
    if (st) st.support_phone = phone.trim() || null;
    S.editSupport = { studentId:'', studentName:'', phone:'', saving:false, err:'' };
    closeModal();
    document.getElementById('pc').innerHTML = renderPage('students');
    lucide.createIcons();
  } catch(e) {
    S.editSupport.saving = false;
    S.editSupport.err = e.message;
    renderModal();
  }
}

async function deleteTask(id) {
  if (!confirm('Excluir esta tarefa?')) return;
  const { error } = await SB.from('tasks').delete().eq('id', id);
  if (!error) {
    S.tasks.list = S.tasks.list.filter(t => t.id !== id);
    document.getElementById('pc').innerHTML = renderPage('tasks');
    lucide.createIcons();
  }
}

async function saveCollab() {
  const { id, name, email, pw, role, notes } = S.collabForm;
  if (!name.trim() || !role.trim()) return;
  S.collabForm.saving = true; S.collabForm.err = '';
  renderModal();
  try {
    if (id) {
      // Edição: apenas atualiza dados na tabela (não altera conta Auth)
      const { error } = await SB.from('collaborators')
        .update({ name: name.trim(), role: role.trim(), notes: notes.trim()||null })
        .eq('id', id);
      if (error) throw new Error(error.message);
    } else {
      // Criação: chama Edge Function que cria conta Auth + insere na tabela
      if (!email.trim() || !pw.trim()) throw new Error('E-mail e senha são obrigatórios.');
      const { data: { session } } = await SB.auth.getSession();
      const res = await fetch(`${SUPABASE_FN}/create-collaborator`, {
        method: 'POST',
        headers: { 'Content-Type':'application/json', 'Authorization':`Bearer ${session.access_token}` },
        body: JSON.stringify({ email: email.trim().toLowerCase(), password: pw, name: name.trim(), role: role.trim(), notes: notes.trim()||null }),
      });
      const json = await res.json();
      if (json.error) throw new Error(json.error);
    }
    S.collaborators.list = [];
    closeModal();
    await loadAndRender('collaborators');
  } catch(e) {
    S.collabForm.saving = false;
    S.collabForm.err = e.message;
    renderModal();
  }
}

async function deleteCollab(id) {
  if (!confirm('Excluir este colaborador?')) return;
  const { error } = await SB.from('collaborators').delete().eq('id', id);
  if (!error) {
    S.collaborators.list = S.collaborators.list.filter(c => c.id !== id);
    document.getElementById('pc').innerHTML = renderPage('collaborators');
    lucide.createIcons();
  }
}

/* ═══════════════════════════════════════════════════════════════════════════════
   EVENT HANDLERS
═══════════════════════════════════════════════════════════════════════════════ */
document.addEventListener('click', function(e) {
  const t = e.target.closest('[data-action]');
  if (!t) return;
  const { action, page, modal, v, dow, time, date, id } = t.dataset;

  switch (action) {
    case 'open-drawer':
      document.getElementById('drw').classList.add('open');
      document.getElementById('drw-overlay').classList.add('open');
      break;
    case 'close-drawer':
      document.getElementById('drw').classList.remove('open');
      document.getElementById('drw-overlay').classList.remove('open');
      break;
    case 'nav':
      S.page = page;
      document.getElementById('drw').classList.remove('open');
      document.getElementById('drw-overlay').classList.remove('open');
      render();
      break;
    case 'connect-gcal-admin':
      connectGoogleCalendarAdmin();
      break;
    case 'signout':
      SB.auth.signOut().then(() => window.location.href = '/admin-login');
      break;
    case 'open-modal':
      openModal(modal);
      break;
    case 'close-modal':
      if (e.target === t) closeModal();
      break;
    case 'toggle-slot':
      toggleSlot(dow, time);
      break;
    case 'toggle-block':
      if (date) toggleBlock(date);
      break;
    case 'prev-cal-mo':
      if (S.avail.mo === 0) { S.avail.mo = 11; S.avail.yr--; }
      else S.avail.mo--;
      S.avail.blocked = [];
      loadAndRender('availability');
      break;
    case 'next-cal-mo':
      if (S.avail.mo === 11) { S.avail.mo = 0; S.avail.yr++; }
      else S.avail.mo++;
      S.avail.blocked = [];
      loadAndRender('availability');
      break;
    case 'book-filter':
      S.bookings.filter = v;
      S.bookings.page = 0;
      document.getElementById('pc').innerHTML = renderPage('bookings');
      lucide.createIcons();
      break;
    case 'task-filter':
      // handled by select input event
      break;
    case 'save-student':
      saveStudent();
      break;
    case 'save-task':
      saveTask();
      break;
    case 'refresh-tasks':
      S.tasks.list = [];
      loadAndRender('tasks');
      break;
    case 'delete-task':
      deleteTask(id);
      break;
    case 'edit-support':
      S.editSupport = { studentId: id, studentName: t.dataset.name||'', phone: t.dataset.phone||'', saving:false, err:'' };
      openModal('edit-support');
      break;
    case 'save-support':
      saveSupport();
      break;
    case 'edit-plan':
      S.editPlan = { studentId: id, studentName: t.dataset.name||'', currentPlan: t.dataset.plan||'FAST', newPlan: t.dataset.plan||'FAST', confirmed:false, saving:false, err:'' };
      openModal('edit-plan');
      break;
    case 'plan-option':
      S.editPlan.newPlan = v;
      S.editPlan.confirmed = false;
      renderModal();
      break;
    case 'confirm-plan-change':
      S.editPlan.confirmed = true;
      renderModal();
      break;
    case 'save-plan':
      savePlan();
      break;
    case 'edit-collab': {
      const c = S.collaborators.list.find(x => x.id === id);
      if (c) openModal('edit-collab', { id:c.id, name:c.name||'', email:c.email||'', role:c.role||'', notes:c.notes||'' });
      break;
    }
    case 'save-collab':
      saveCollab();
      break;
    case 'delete-collab':
      deleteCollab(id);
      break;
    case 'admin-save-cfg':
      adminSaveCfg(id);
      break;
    case 'view-student':
      openStudentDetail(id);
      break;
    case 'toggle-alumni':
      S.students.showAlumni = t.dataset.alumni === '1';
      S.students.planFilter = '';
      S.students.search = '';
      S.students.page = 0;
      document.getElementById('pc').innerHTML = renderPage('students');
      lucide.createIcons();
      break;
    case 'filter-plan':
      S.students.planFilter = t.dataset.plan || '';
      S.students.showAlumni = false;
      S.students.page = 0;
      document.getElementById('pc').innerHTML = renderPage('students');
      lucide.createIcons();
      break;
    case 'students-page':
      S.students.page = parseInt(t.dataset.pg) || 0;
      document.getElementById('pc').innerHTML = renderPage('students');
      lucide.createIcons();
      break;
    case 'bookings-page':
      S.bookings.page = parseInt(t.dataset.pg) || 0;
      document.getElementById('pc').innerHTML = renderPage('bookings');
      lucide.createIcons();
      break;
    case 'close-student-detail':
      if (e.target === t) {
        document.getElementById('mr').innerHTML = '';
      }
      break;

  }
});

document.addEventListener('input', function(e) {
  const t = e.target.closest('[data-input]');
  if (!t) return;
  const v = t.value;
  switch (t.dataset.input) {
    case 'search-students':
      S.students.search = v;
      S.students.page = 0;
      debounce('search-students', () => {
        document.getElementById('pc').innerHTML = renderPage('students');
        lucide.createIcons();
        const inp = document.querySelector('[data-input="search-students"]'); if (inp) { inp.focus(); inp.setSelectionRange(v.length,v.length); }
      });
      break;
    case 'search-bookings':
      S.bookings.search = v;
      S.bookings.page = 0;
      debounce('search-bookings', () => {
        document.getElementById('pc').innerHTML = renderPage('bookings');
        lucide.createIcons();
        const inp = document.querySelector('[data-input="search-bookings"]'); if (inp) { inp.focus(); inp.setSelectionRange(v.length,v.length); }
      });
      break;
    case 'search-collabs':
      S.collaborators.search = v;
      debounce('search-collabs', () => {
        document.getElementById('pc').innerHTML = renderPage('collaborators');
        lucide.createIcons();
        const inp = document.querySelector('[data-input="search-collabs"]'); if (inp) { inp.focus(); inp.setSelectionRange(v.length,v.length); }
      });
      break;
    case 'admin-cfg-pw':  S.cfg.pw     = v; break;
    case 'admin-cfg-pwc': S.cfg.pwConf = v; break;
    case 'new-plan-select':
      S.editPlan.newPlan   = v;
      S.editPlan.confirmed = false;
      renderModal();
      break;
    case 'st-name':    S.newStudent.name  = v; updateModalBtn(); break;
    case 'st-email':   S.newStudent.email = v; updateModalBtn(); break;
    case 'st-pw':      S.newStudent.pw    = v; updateModalBtn(); break;
    case 'st-plan':    S.newStudent.plan  = v; break;
    case 'tk-student': S.newTask.studentId = v; updateModalBtn(); break;
    case 'tk-call':    S.newTask.callNum  = v; break;
    case 'tk-title':   S.newTask.title    = v; updateModalBtn(); break;
    case 'tk-note':    S.newTask.note     = v; break;
    case 'sp-phone':   S.editSupport.phone = v; break;
    case 'cb-name':    S.collabForm.name  = v; updateModalBtn(); break;
    case 'cb-role':    /* handled inline onchange */ break;
    case 'cb-email':   S.collabForm.email = v; updateModalBtn(); break;
    case 'cb-pw':      S.collabForm.pw    = v; updateModalBtn(); break;
    case 'cb-notes':   S.collabForm.notes = v; break;
  }
});

/* Atualiza apenas o botão do modal sem re-renderizar tudo (evita perda de foco) */
function updateModalBtn() {
  const btn = document.querySelector('[data-action="save-student"],[data-action="save-task"],[data-action="save-support"],[data-action="save-collab"]');
  if (!btn) return;
  let ok = false;
  if (S.modal === 'new-student') {
    const { name, email, pw, saving } = S.newStudent;
    ok = !!(name && email && pw) && !saving;
  } else if (S.modal === 'new-task') {
    const { studentId, title, saving } = S.newTask;
    ok = !!(studentId && title) && !saving;
  } else if (S.modal === 'new-collab') {
    const { name, email, pw, role, saving } = S.collabForm;
    ok = !!(name.trim() && email.trim() && pw.trim() && role.trim()) && !saving;
  } else if (S.modal === 'edit-collab') {
    const { name, role, saving } = S.collabForm;
    ok = !!(name.trim() && role.trim()) && !saving;
  }
  btn.disabled = !ok;
  btn.style.opacity = ok ? '1' : '.4';
  btn.style.cursor  = ok ? 'pointer' : 'not-allowed';
}

document.addEventListener('change', function(e) {
  const t = e.target.closest('[data-action="task-filter"]');
  if (t) {
    S.tasks.filterStudentId = t.value;
    S.tasks.list = [];
    loadAndRender('tasks');

document.addEventListener('input', debounce(function(e) {

  }
}, 250));

/* ═══════════════════════════════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════════════════════════════ */
SB.auth.getSession().then(async function({ data: { session } }) {
  if (!session) { window.location.replace('/admin-login'); return; }

  // Determina perfil
  if (session.user.email === MENTOR_EMAIL) {
    S.currentRole = 'super_admin';
  } else {
    const { data: collab } = await SB.from('collaborators')
      .select('role').eq('email', session.user.email).maybeSingle();
    if (!collab) {
      await SB.auth.signOut();
      window.location.replace('/admin-login');
      return;
    }
    S.currentRole = collab.role || 'professor';
  }

  S.user = session.user;
  S.session = session;
  S.page = ROLE_FIRST[S.currentRole] || 'overview';
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  render();

  // Supabase Realtime — atualiza a página automaticamente quando dados mudam
  function realtimeRefresh(table) {
    const pageMap = { bookings:'bookings', tasks:'tasks', feedbacks:'feedbacks', student_profiles:'students', weekly_growth:'students' };
    const targetPage = pageMap[table];
    // Invalidar cache
    if (table === 'student_profiles') S.students._ts = 0;
    if (table === 'bookings') S.bookings._ts = 0;
    // Se estiver na página afetada, recarrega
    if (targetPage && S.page === targetPage) {
      loadPageData(S.page).then(() => {
        document.getElementById('pc').innerHTML = renderPage(S.page);
        lucide.createIcons();
      });
    }
    // Sempre atualizar overview se dados mudaram
    if (S.page === 'overview') { S.stats.loaded = false; loadAndRender('overview'); }
  }
  SB.channel('admin-realtime')
    .on('postgres_changes', { event:'*', schema:'public', table:'bookings' },    () => realtimeRefresh('bookings'))
    .on('postgres_changes', { event:'*', schema:'public', table:'tasks' },       () => realtimeRefresh('tasks'))
    .on('postgres_changes', { event:'*', schema:'public', table:'feedbacks' },   () => realtimeRefresh('feedbacks'))
    .on('postgres_changes', { event:'*', schema:'public', table:'student_profiles' }, () => realtimeRefresh('student_profiles'))
    .on('postgres_changes', { event:'*', schema:'public', table:'weekly_growth' },    () => realtimeRefresh('weekly_growth'))
    .subscribe();
});

SB.auth.onAuthStateChange(function(event) {
  if (event === 'SIGNED_OUT') window.location.replace('/admin-login');
});

/* ─── Google Calendar ──────────────────────────────────────────────────── */
async function loadGCalStatus() {
  try {
    const { data: { session } } = await SB.auth.getSession();
    if (!session) return;
    const res  = await fetch(`${SUPABASE_FN}/google-calendar`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session.access_token}` },
      body: JSON.stringify({ action: 'status' }),
    });
    const json = await res.json();
    S.gcal.connected = !!json.connected;
    S.gcal.email     = json.email || null;
    const txt = document.getElementById('gcal-status-text');
    if (txt) txt.textContent = S.gcal.connected ? `Conectado: ${S.gcal.email}` : 'Não conectado';
  } catch(e) {
    console.error('GCal status error:', e);
    const txt = document.getElementById('gcal-status-text');
    if (txt) txt.textContent = 'Erro ao verificar';
  }
}
