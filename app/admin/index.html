<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <meta name="robots" content="noindex,nofollow"/>
  <title>Admin · Eternity Academy</title>
  <link rel="icon" type="image/png" href="/medias/eternityfavicon.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #050508; --white: #F7F7F7; --dp: #2F054C; --purple: #7022BB;
      --surface: #090909; --card: #111111; --border: rgba(255,255,255,0.08);
      --faint: rgba(255,255,255,0.05); --muted: rgba(247,247,247,0.55);
      --font: 'Red Hat Display', sans-serif;
    }
    html, body { height: 100%; background: var(--black); color: var(--white); font-family: var(--font); -webkit-font-smoothing: antialiased; overflow: hidden; }
    .app { display: flex; height: 100vh; overflow: hidden; }

    /* Sidebar */
    .sidebar { width: 216px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
    .sb-logo { padding: 20px 22px; border-bottom: 1px solid var(--border); }
    .sb-user { padding: 18px 22px; border-bottom: 1px solid var(--border); }
    .sb-name { font-weight: 700; font-size: 14px; color: var(--white); }
    .sb-plan { font-size: 10px; color: #f59e0b; font-weight: 700; letter-spacing: 0.5px; margin-top: 3px; }
    .sb-nav  { flex: 1; padding: 14px 10px; display: flex; flex-direction: column; gap: 1px; overflow-y: auto; }
    .sb-foot { padding: 14px 22px; border-top: 1px solid var(--border); color: rgba(247,247,247,0.30); font-size: 9px; letter-spacing: 1px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; cursor: pointer; color: rgba(247,247,247,0.55); font-size: 13px; border-left: 3px solid transparent; transition: all 0.18s; user-select: none; }
    .nav-item:hover { color: rgba(247,247,247,0.85); background: rgba(255,255,255,0.04); }
    .nav-item.active { background: rgba(245,158,11,0.12); color: var(--white); font-weight: 700; border-left-color: #f59e0b; }
    .nav-item svg { flex-shrink: 0; }

    /* Main */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
    .topbar { height: 58px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 28px; flex-shrink: 0; font-size: 12px; color: rgba(247,247,247,0.50); gap: 4px; }
    .topbar strong { color: var(--white); font-weight: 600; }
    .page-wrap { flex: 1; overflow-y: auto; padding: 32px 36px; }

    /* Cards */
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; }

    /* Typography */
    .lbl { font-size: 10px; font-weight: 700; letter-spacing: 2.5px; color: rgba(247,247,247,0.60); margin-bottom: 10px; }
    .ph1 { font-weight: 900; font-size: 28px; letter-spacing: -1px; color: var(--white); line-height: 1; margin-bottom: 6px; }
    .sub { color: rgba(247,247,247,0.60); font-size: 13px; }

    /* Buttons */
    .btn-p { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 8px 16px; border-radius: 9px; font-size: 11px; font-weight: 700; letter-spacing: 0.3px; background: linear-gradient(135deg,var(--dp),var(--purple)); color: var(--white); border: 1px solid var(--purple); cursor: pointer; font-family: var(--font); box-shadow: 0 4px 14px rgba(112,34,187,0.3); transition: transform .15s, box-shadow .15s; white-space: nowrap; }
    .btn-p:hover:not([disabled]) { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(112,34,187,0.42); }
    .btn-p[disabled] { opacity: 0.38; cursor: not-allowed; }
    .btn-amber { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 8px 16px; border-radius: 9px; font-size: 11px; font-weight: 700; letter-spacing: 0.3px; background: linear-gradient(135deg,#92400e,#f59e0b); color: var(--white); border: 1px solid #f59e0b; cursor: pointer; font-family: var(--font); box-shadow: 0 4px 14px rgba(245,158,11,0.25); transition: transform .15s; white-space: nowrap; }
    .btn-amber:hover:not([disabled]) { transform: translateY(-1px); }
    .btn-amber[disabled] { opacity: 0.38; cursor: not-allowed; }
    .btn-ghost { display: inline-flex; align-items: center; justify-content: center; padding: 7px 14px; border-radius: 9px; background: var(--faint); border: 1px solid var(--border); color: var(--muted); cursor: pointer; font-family: var(--font); font-size: 11px; font-weight: 600; gap: 6px; transition: all .15s; }
    .btn-ghost:hover { background: rgba(255,255,255,0.08); color: var(--white); }
    .btn-danger { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 6px 12px; border-radius: 8px; font-size: 10px; font-weight: 700; background: transparent; color: rgba(248,113,113,0.5); border: 1px solid rgba(248,113,113,0.2); cursor: pointer; font-family: var(--font); transition: all .15s; }
    .btn-danger:hover { background: rgba(248,113,113,0.1); color: #f87171; border-color: rgba(248,113,113,0.4); }

    /* Inputs */
    .inp { width: 100%; background: var(--faint); border: 1px solid var(--border); border-radius: 10px; padding: 11px 14px; color: var(--white); font-size: 13px; font-family: var(--font); font-weight: 500; outline: none; transition: border-color .2s; }
    .inp::placeholder { color: rgba(247,247,247,0.35); }
    .inp:focus { border-color: var(--purple); box-shadow: 0 0 0 3px rgba(112,34,187,0.12); }
    select.inp { appearance: none; -webkit-appearance: none; cursor: pointer; }
    textarea.inp { resize: none; line-height: 1.6; }

    /* Stat cards */
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px 22px; }
    .stat-val { font-weight: 900; font-size: 32px; letter-spacing: -1px; color: var(--white); line-height: 1; }
    .stat-lbl { font-size: 11px; color: rgba(247,247,247,0.35); margin-top: 4px; }

    /* Slot grid */
    .slot-grid { display: grid; gap: 5px; }
    .slot-cell { border-radius: 10px; border: 1px solid var(--border); background: var(--faint); cursor: pointer; transition: all .15s; display: flex; align-items: center; justify-content: center; min-height: 44px; font-size: 10px; font-weight: 700; color: rgba(247,247,247,0.2); user-select: none; }
    .slot-cell:hover:not(.slot-header) { background: rgba(112,34,187,0.1); border-color: rgba(112,34,187,0.3); }
    .slot-cell.on { background: rgba(112,34,187,0.2); border-color: var(--purple); color: var(--white); }
    .slot-cell.slot-header { background: transparent; border: none; font-size: 9px; font-weight: 700; letter-spacing: 2px; color: rgba(247,247,247,0.25); cursor: default; min-height: 28px; }
    .slot-cell.slot-time { background: transparent; border: none; justify-content: flex-end; padding-right: 8px; font-size: 12px; color: rgba(247,247,247,0.4); font-weight: 600; cursor: default; }

    /* Calendar */
    .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; }
    .cal-cell { min-height: 52px; border-radius: 10px; padding: 8px; background: var(--card); border: 1px solid var(--border); cursor: pointer; transition: all .15s; }
    .cal-cell:hover:not(.empty):not(.past) { border-color: rgba(255,255,255,0.2); }
    .cal-cell.empty { opacity: 0; pointer-events: none; }
    .cal-cell.past { opacity: 0.35; cursor: default; }
    .cal-cell.blocked { background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.25); }
    .cal-day { font-size: 12px; font-weight: 500; color: rgba(247,247,247,0.4); }
    .cal-cell.blocked .cal-day { color: #f87171; font-weight: 700; }

    /* Table rows */
    .trow { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 18px; display: flex; align-items: center; gap: 14px; transition: background .15s; }
    .trow:hover { background: rgba(255,255,255,0.03); }

    /* Tags */
    .tag { display: inline-flex; align-items: center; border-radius: 6px; padding: 3px 8px; font-size: 9px; font-weight: 700; letter-spacing: 0.5px; }
    .tag-green { background: rgba(34,197,94,0.12); color: #22c55e; }
    .tag-amber { background: rgba(245,158,11,0.12); color: #f59e0b; }
    .tag-purple { background: rgba(112,34,187,0.18); color: #a855f7; }
    .tag-red { background: rgba(239,68,68,0.12); color: #f87171; }

    /* Hw check */
    .hw-check { width: 20px; height: 20px; border-radius: 6px; flex-shrink: 0; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; transition: all .2s; }
    .hw-check.done { background: #22c55e; border-color: #22c55e; }

    /* Stars */
    .star-filled { color: #f59e0b; }
    .star-empty  { color: rgba(247,247,247,0.15); }

    /* Modal */
    .overlay { position: fixed; inset: 0; background: rgba(5,5,8,0.94); display: flex; align-items: center; justify-content: center; z-index: 200; backdrop-filter: blur(10px); animation: fadeUp .18s ease; }
    .modal { background: var(--card); border-radius: 24px; padding: 36px; width: 480px; max-width: calc(100vw - 32px); border: 1px solid var(--border); box-shadow: 0 32px 80px rgba(0,0,0,0.85); animation: scaleIn .22s ease; max-height: 90vh; overflow-y: auto; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }
    input, textarea, select { font-family: var(--font); }

    /* Animations */
    @keyframes fadeUp  { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes scaleIn { from { transform:scale(0.93); opacity:0; } to { transform:scale(1); opacity:1; } }
    @keyframes spin    { to { transform:rotate(360deg); } }
    @keyframes fadeIn  { from { opacity:0; } to { opacity:1; } }
    .fu  { animation: fadeUp .3s ease both; }
    .fu1 { animation: fadeUp .3s ease .06s both; }
    .fu2 { animation: fadeUp .3s ease .12s both; }

    /* Mobile topbar */
    .mob-top { display:none; }

    /* Drawer */
    .drw-overlay { display:none; position:fixed; inset:0; background:rgba(5,5,8,0.7); z-index:199; }
    .drw-overlay.open { display:block; animation:fadeIn .2s ease; }
    .drw { position:fixed; top:0; left:0; bottom:0; z-index:200; width:78%; max-width:300px; background:#0e0e0e; border-right:1px solid var(--border); display:flex; flex-direction:column; transform:translateX(-100%); transition:transform .28s cubic-bezier(.4,0,.2,1); will-change:transform; }
    .drw.open { transform:translateX(0); }
    .drw-item { display:flex; align-items:center; gap:14px; padding:13px 14px; border-radius:12px; cursor:pointer; border-left:3px solid transparent; transition:all .15s; }
    .drw-item.active { background:rgba(245,158,11,0.12); border-left-color:#f59e0b; }
    .drw-icon { width:34px; height:34px; border-radius:9px; flex-shrink:0; background:rgba(255,255,255,0.04); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; }
    .drw-item.active .drw-icon { background:rgba(245,158,11,0.15); border-color:#f59e0b; }

    @media (max-width: 768px) {
      html, body { overflow:hidden; }
      .sidebar { display:none; }
      .topbar  { display:none; }
      .mob-top { display:flex; align-items:center; justify-content:center; position:sticky; top:0; z-index:100; background:rgba(9,9,9,0.97); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); padding:14px 20px; flex-shrink:0; }
      .page-wrap { padding:16px 16px 40px; }
      .modal { border-radius:20px 20px 0 0 !important; width:100% !important; max-width:100% !important; position:fixed !important; bottom:0 !important; left:0 !important; right:0 !important; max-height:85vh; overflow-y:auto; padding:24px 20px 40px !important; }
      .avail-wrap { padding:0 !important; }
      .avail-card { padding:16px !important; }
      .cal-cell { min-height:36px !important; padding:5px 4px !important; }
      .cal-day  { font-size:11px !important; }
      .ph1 { font-size:20px; }
      .stat-val { font-size:22px; }
      .fu1 { grid-template-columns:repeat(2,1fr) !important; }
      .fu2 { grid-template-columns:1fr !important; }
      .trow { flex-wrap:wrap; gap:8px; padding:12px 14px; }
      input, textarea, select { font-size:16px; }
    }
  </style>
</head>

/* Debounce */
const _dbTimers = {};
function debounce(key, fn, ms=250) { clearTimeout(_dbTimers[key]); _dbTimers[key] = setTimeout(fn, ms); }

/* Phone validation — aceita formatos: +5511999999999, (11)99999-9999, 11999999999 etc */
function cleanPhone(v) { return (v||'').replace(/\D/g,''); }
function isValidPhone(v) { const d = cleanPhone(v); return d.length >= 10 && d.length <= 15; }
function formatPhone(v) {
  const d = cleanPhone(v);
  if (d.length === 13) return '+' + d.slice(0,2) + ' (' + d.slice(2,4) + ') ' + d.slice(4,9) + '-' + d.slice(9);
  if (d.length === 11) return '(' + d.slice(0,2) + ') ' + d.slice(2,7) + '-' + d.slice(7);
  if (d.length === 10) return '(' + d.slice(0,2) + ') ' + d.slice(2,6) + '-' + d.slice(6);
  return v;
}

/* Toast notifications */
function showToast(msg, type='info') {
  let c = document.getElementById('toast-container');
  if (!c) { c = document.createElement('div'); c.id='toast-container'; c.style.cssText='position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none'; document.body.appendChild(c); }
  const bg = type==='success'?'rgba(34,197,94,.15)':type==='error'?'rgba(248,113,113,.15)':'rgba(255,255,255,.1)';
  const bc = type==='success'?'rgba(34,197,94,.3)':type==='error'?'rgba(248,113,113,.3)':'rgba(255,255,255,.15)';
  const tc = type==='success'?'#22c55e':type==='error'?'#f87171':'#F7F7F7';
  const t = document.createElement('div');
  t.style.cssText = `background:${bg};border:1px solid ${bc};color:${tc};padding:10px 16px;border-radius:10px;font-size:12px;font-weight:600;font-family:var(--font);backdrop-filter:blur(12px);animation:fadeUp .2s ease;pointer-events:auto`;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; t.style.transition='opacity .3s'; setTimeout(()=>t.remove(), 300); }, 3000);
}

      action,
      target_type: targetType,
      target_id: targetId,
      target_name: targetName,
      details
    });

}

/* ─── HELPERS ─────────────────────────────────────────────────────────────── */
function ic(name, size=15, extra='') {
  return `<i data-lucide="${name}" style="width:${size}px;height:${size}px;flex-shrink:0;display:inline-flex;${extra}"></i>`;
}
function fieldLabel(text) {
  return `<label style="color:rgba(247,247,247,0.28);font-size:9px;font-weight:700;letter-spacing:2px;display:block;margin-bottom:7px">${text}</label>`;
}
function spinner(size=16) {
  return `<div style="width:${size}px;height:${size}px;border:2px solid rgba(112,34,187,.25);border-top-color:#7022BB;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0"></div>`;
}
function starsHtml(rating) {
  if (!rating) return '<span style="color:rgba(247,247,247,.2);font-size:11px">—</span>';
  return [1,2,3,4,5].map(s=>
    `<svg viewBox="0 0 24 24" width="13" height="13" fill="${s<=rating?'#f59e0b':'none'}" stroke="${s<=rating?'#f59e0b':'rgba(247,247,247,0.15)'}" stroke-width="1.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`
  ).join('');
}
function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()} às ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function fmtDateOnly(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()}`;
}
function initials(name) {
  const p = (name||'?').trim().split(' ');
  return (p.length>=2 ? p[0][0]+p[p.length-1][0] : p[0].slice(0,2)).toUpperCase();
}
function roleTag(role) {
  const map = { super_admin:['tag-amber','Super Admin'], admin:['tag-purple','Admin'], professor:['tag-green','Professor(a)'] };
  const [cls, lbl] = map[role] || ['tag-green', role || 'Sem função'];
  return `<span class="tag ${cls}">${lbl}</span>`;
}
function avatar(name, size=34) {
  return `<div style="width:${size}px;height:${size}px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,#2F054C,#7022BB);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:${Math.round(size*.36)}px;color:#F7F7F7">${initials(name)}</div>`;
}

function render(scrollReset=true) {
  // Redireciona para primeira página acessível se o perfil não tem acesso
  if (!(NAV_ACCESS[S.page]||[]).includes(S.currentRole)) {
    S.page = ROLE_FIRST[S.currentRole] || visibleNav()[0]?.id || 'availability';
  }
  renderSidebar();
  document.getElementById('bc').textContent = CRUMBS[S.page]||'';
  const pc = document.getElementById('pc');
  if (scrollReset) pc.scrollTop = 0;
  switch (S.page) {
    case 'overview':      loadAndRender('overview');      break;
    case 'availability':  loadAndRender('availability');  break;
    case 'bookings':      loadAndRender('bookings');      break;
    case 'students':      loadAndRender('students');      break;
    case 'expirations':   loadAndRender('expirations');   break;
    case 'collaborators': loadAndRender('collaborators'); break;
    case 'tasks':         loadAndRender('tasks');         break;
    case 'feedbacks':     loadAndRender('feedbacks');     break;
    case 'analytics':     loadAndRender('analytics');     break;
    case 'audit':         loadAndRender('audit');         break;
    case 'account':
      pc.innerHTML = pageAccount();
      lucide.createIcons();
      if (S.currentRole === 'super_admin') loadGCalStatus();
      break;
  }
}

async function loadAndRender(page) {
  const pc = document.getElementById('pc');
  pc.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:300px;gap:12px;color:rgba(247,247,247,.3);font-size:13px">${spinner(18)} Carregando...</div>`;
  await loadPageData(page);
  pc.innerHTML = renderPage(page);
  lucide.createIcons();
  trackEvent('page_view', page);
}

async function loadPageData(page) {
  try {
    switch (page) {
      case 'overview':     await loadOverview();     break;
      case 'availability': await loadAvailability(); break;
      case 'bookings':      await loadBookings();        break;
      case 'students':      await loadStudents(true);     break;
      case 'expirations':   await loadExpirations();     break;
      case 'collaborators': await loadCollaborators();   break;
      case 'tasks':         await Promise.all([loadTasks(), loadStudents()]); break;
      case 'feedbacks':     await loadFeedbacks();       break;
      case 'analytics':     await loadAnalytics();       break;
      case 'audit':         await loadAuditLog();        break;
    }
  } catch(e) { console.warn('loadPageData:', e); showToast('Erro ao carregar dados. Tente novamente.', 'error'); }
}

function renderPage(page) {
  switch (page) {
    case 'overview':      return pageOverview();
    case 'availability':  return pageAvailability();
    case 'bookings':      return pageBookings();
    case 'students':      return pageStudents();
    case 'expirations':   return pageExpirations();
    case 'collaborators': return pageCollaborators();
    case 'tasks':         return pageTasks();
    case 'feedbacks':     return pageFeedbacks();
    case 'analytics':     return pageAnalytics();
    case 'audit':         return pageAudit();
    case 'account':       return pageAccount();
    default: return '';
  }
}

/* ═══════════════════════════════════════════════════════════════════════════════
   DATA LOADERS

async function loadOverview() {
  if (S.stats.loaded) return;
  const now = new Date();
  const start = `${now.getFullYear()}-${pad(now.getMonth()+1)}-01`;
  const end   = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(getDays(now.getFullYear(),now.getMonth()))}`;

  const [bkRes, stRes, fbRes, nextRes, expRes] = await Promise.all([
    SB.from('bookings').select('id', {count:'exact',head:true}).eq('mentor_email',MENTOR_EMAIL).gte('scheduled_at',`${start}T00:00:00-03:00`).lte('scheduled_at',`${end}T23:59:59-03:00`),
    SB.from('student_profiles').select('id', {count:'exact',head:true}),
    SB.from('feedbacks').select('id', {count:'exact',head:true}),
    SB.from('bookings').select('scheduled_at,call_title,student_id').eq('mentor_email',MENTOR_EMAIL).eq('status','confirmed').gt('scheduled_at',new Date().toISOString()).order('scheduled_at').limit(1).maybeSingle(),
    SB.from('student_profiles').select('id,full_name,email,plan,plan_expires_at').not('plan_expires_at','is',null).order('plan_expires_at',{ascending:true}),
  ]);
  S.stats = {
    bookings: bkRes.count ?? 0,
    students: stRes.count ?? 0,
    feedbacks: fbRes.count ?? 0,
    nextBooking: nextRes.data,
    loaded: true,
  };
  S.expirations.list = expRes.data || [];
}

async function loadAvailability() {
  const [slotRes, blockRes] = await Promise.all([
    SB.from('mentor_slots').select('*').eq('mentor_email',MENTOR_EMAIL),
    SB.from('blocked_dates').select('*').eq('mentor_email',MENTOR_EMAIL)
      .gte('blocked_date', `${S.avail.yr}-${pad(S.avail.mo+1)}-01`)
      .lte('blocked_date', `${S.avail.yr}-${pad(S.avail.mo+1)}-${pad(getDays(S.avail.yr,S.avail.mo))}`),
  ]);
  S.avail.slots   = slotRes.data  || [];
  S.avail.blocked = blockRes.data || [];
}

const CACHE_TTL = 60000; // 60s

async function loadBookings(forceRefresh=false) {
  const fresh = Date.now() - S.bookings._ts < CACHE_TTL;
  if (S.bookings.list.length && !forceRefresh && fresh) return;
  const [bookRes, profRes] = await Promise.all([
    SB.from('bookings').select('*')
      .eq('mentor_email', MENTOR_EMAIL)
      .eq('status','confirmed')
      .order('scheduled_at', {ascending: S.bookings.filter === 'upcoming'}),
    SB.from('student_profiles').select('id, full_name, email'),
  ]);
  const profs = {};
  for (const p of (profRes.data || [])) profs[p.id] = p;
  S.bookings.list = (bookRes.data || []).map(b => ({
    ...b,
    _sName:  b.student_name  || profs[b.student_id]?.full_name  || profs[b.student_id]?.email || '—',
    _sEmail: b.student_email || profs[b.student_id]?.email || '—',
  }));
  S.bookings._ts = Date.now();
}
async function loadStudents(forceRefresh=false) {
  const fresh = Date.now() - S.students._ts < CACHE_TTL;
  if (S.students.list.length && !forceRefresh && fresh) return;
  const { data } = await SB.from('student_profiles').select('*').order('created_at', {ascending:false});
  S.students.list = data || [];
  S.students._ts = Date.now();
}

async function loadTasks() {
  const [taskRes, profRes] = await Promise.all([
    (() => {
      const q = SB.from('tasks').select('*').order('created_at',{ascending:false});
      if (S.tasks.filterStudentId) q.eq('student_id', S.tasks.filterStudentId);
      return q;
    })(),
    SB.from('student_profiles').select('id, full_name, email'),
  ]);
  const profs = {};
  for (const p of (profRes.data || [])) profs[p.id] = p;
  S.tasks.list = (taskRes.data || []).map(t => ({
    ...t, student_profiles: profs[t.student_id] || null,
  }));
}

async function loadFeedbacks() {
  if (S.feedbacks.list.length) return;
  const { data } = await SB.from('feedbacks').select('*').order('created_at',{ascending:false});
  S.feedbacks.list = data || [];
}

async function loadExpirations() {
  const { data } = await SB.from('student_profiles')
    .select('id, full_name, email, plan, plan_expires_at')
    .not('plan_expires_at', 'is', null)
    .order('plan_expires_at', { ascending: true });
  S.expirations.list = data || [];
}

function pageExpirations() {
  const now = new Date();
  const list = S.expirations.list;

  const rows = list.length === 0
    ? `<div style="text-align:center;padding:60px 20px;color:rgba(247,247,247,.25);font-size:13px">Nenhum aluno com data de expiração cadastrada.</div>`
    : list.map(st => {
        const exp = new Date(st.plan_expires_at);
        const diffDays = Math.ceil((exp - now) / (1000 * 60 * 60 * 24));
        const expired = diffDays < 0;
        const soonDays = 7;
        const soon = !expired && diffDays <= soonDays;

        let statusColor, statusBg, statusBorder, statusLabel;
        if (expired) {
          statusColor = '#f87171'; statusBg = 'rgba(239,68,68,0.08)'; statusBorder = 'rgba(239,68,68,0.2)';
          statusLabel = `Expirado há ${Math.abs(diffDays)}d`;
        } else if (soon) {
          statusColor = '#f59e0b'; statusBg = 'rgba(245,158,11,0.08)'; statusBorder = 'rgba(245,158,11,0.2)';
          statusLabel = diffDays === 0 ? 'Expira hoje' : `Expira em ${diffDays}d`;
        } else {
          statusColor = '#22c55e'; statusBg = 'rgba(34,197,94,0.06)'; statusBorder = 'rgba(34,197,94,0.15)';
          statusLabel = `Expira em ${diffDays}d`;
        }

        const d = exp;
        const dateStr = `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()}`;

        return `
        <div style="border-radius:14px;overflow:hidden;border:1px solid ${statusBorder};margin-bottom:2px">
          <div class="trow" style="background:${statusBg};border:none;cursor:pointer" onclick="document.getElementById('exp-panel-${st.id}').style.display=document.getElementById('exp-panel-${st.id}').style.display==='none'?'flex':'none'">
            ${avatar(st.full_name || st.email || '?', 36)}
            <div style="flex:1;min-width:0">
              <div style="font-weight:700;font-size:13px;color:#F7F7F7;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${st.full_name || '—'}</div>
              <div style="font-size:11px;color:rgba(247,247,247,.35);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${st.email || '—'}</div>
            </div>
            <span style="font-size:9px;font-weight:700;letter-spacing:1px;color:#9333ea;background:rgba(147,51,234,.1);border:1px solid rgba(147,51,234,.2);border-radius:5px;padding:2px 7px;flex-shrink:0">${st.plan || 'FAST'}</span>
            <div style="text-align:right;flex-shrink:0">
              <div style="font-size:12px;font-weight:700;color:${statusColor}">${statusLabel}</div>
              <div style="font-size:10px;color:rgba(247,247,247,.3);margin-top:1px">${dateStr}</div>
            </div>
          </div>
          <div id="exp-panel-${st.id}" style="display:none;flex-direction:column;gap:10px;padding:14px 18px;background:rgba(0,0,0,.25);border-top:1px solid ${statusBorder}">
            <div style="font-size:10px;font-weight:700;color:rgba(247,247,247,.4);letter-spacing:1px;margin-bottom:2px">AÇÕES RÁPIDAS</div>
            <div style="display:flex;gap:8px;flex-wrap:wrap">
              <select id="exp-upgrade-${st.id}" style="flex:1;min-width:140px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:8px 12px;color:#F7F7F7;font-size:12px;font-family:inherit;outline:none;appearance:none">
                <option value="" disabled selected>Upgrade de plano...</option>
                ${['FAST','GROWTH','ETERNITY'].filter(p=>p!==(st.plan||'FAST')).map(p=>`<option value="${p}">${p}</option>`).join('')}
              </select>
              <button onclick="expUpgradePlan('${st.id}')" style="background:linear-gradient(135deg,#7022BB,#9333ea);border:none;border-radius:8px;padding:8px 16px;color:#fff;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap">Upgrade</button>
            </div>
            <div style="display:flex;gap:8px;flex-wrap:wrap">
              <button onclick="moveToAlumni('${st.id}')" style="flex:1;background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.2);border-radius:8px;padding:8px 16px;color:#f59e0b;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s" onmouseenter="this.style.background='rgba(245,158,11,.12)'" onmouseleave="this.style.background='rgba(245,158,11,.06)'">
                <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
                Mover para Antigos Alunos
              </button>
              <button onclick="S.page='students';S.students.list=[];render();setTimeout(()=>openStudentDetail('${st.id}'),400)" style="background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:8px 16px;color:rgba(247,247,247,.6);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s;white-space:nowrap" onmouseenter="this.style.background='rgba(255,255,255,.08)'" onmouseleave="this.style.background='rgba(255,255,255,.05)'">
                <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                Ver Perfil
              </button>
            </div>
          </div>
        </div>`;
      }).join('');

  const expiredCount = list.filter(s => new Date(s.plan_expires_at) < now).length;
  const soonCount    = list.filter(s => { const d = Math.ceil((new Date(s.plan_expires_at)-now)/(1000*60*60*24)); return d>=0 && d<=7; }).length;

  return `
  <div style="padding:32px 36px">
    <div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px">
      <div>
        <div class="lbl">CONTROLE</div>
        <h1 class="ph1">Expirações</h1>
        <p class="sub" style="margin-top:4px">Alunos ordenados pela data de expiração mais próxima</p>
      </div>
      <button class="btn-ghost" onclick="S.expirations.list=[];loadAndRender('expirations')" style="gap:6px">${ic('refresh-cw',13)} Atualizar</button>
    </div>

    ${(expiredCount > 0 || soonCount > 0) ? `
    <div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap">
      ${expiredCount > 0 ? `<div style="display:flex;align-items:center;gap:7px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:10px;padding:8px 14px;font-size:12px;color:#f87171;font-weight:700">${ic('alert-circle',13,'color:#f87171')} ${expiredCount} expirado${expiredCount!==1?'s':''}</div>` : ''}
      ${soonCount > 0 ? `<div style="display:flex;align-items:center;gap:7px;background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.2);border-radius:10px;padding:8px 14px;font-size:12px;color:#f59e0b;font-weight:700">${ic('clock',13,'color:#f59e0b')} ${soonCount} expira${soonCount!==1?'m':''} em até 7 dias</div>` : ''}
    </div>` : ''}

    <div style="display:flex;flex-direction:column;gap:6px">
      ${rows}
    </div>
  </div>`;
}

async function loadAnalytics() {
  if (S.analytics.data && !S.analytics.loading) return;
  S.analytics.loading = true;
  const now = new Date();
  const [stRes, bkRes, tkRes, fbRes, gwRes] = await Promise.all([
    SB.from('student_profiles').select('id,full_name,plan,is_alumni,created_at,plan_expires_at'),
    SB.from('bookings').select('id,student_id,scheduled_at,status,created_at'),
    SB.from('tasks').select('id,student_id,done,created_at'),
    SB.from('feedbacks').select('id,student_id,rating,created_at'),
    SB.from('weekly_growth').select('student_id,gross_revenue,net_revenue,created_at'),
  ]);
  S.analytics.data = {
    students: stRes.data || [],
    bookings: bkRes.data || [],
    tasks: tkRes.data || [],
    feedbacks: fbRes.data || [],
    growth: gwRes.data || [],
    fetchedAt: now,
  };
  S.analytics.loading = false;
}

function pageAnalytics() {
  const { period, data } = S.analytics;
  if (!data) return `<div style="padding:60px;text-align:center">${spinner(22)}</div>`;

  const now = new Date();
  const PERIODS = {
    day:    { label:'Hoje',             days:0 },
    week:   { label:'Últimos 7 dias',   days:7 },
    month:  { label:'Últimos 30 dias',  days:30 },
    prev_month:{ label:'Mês passado',   days:-1 },
    '90d':  { label:'Últimos 90 dias',  days:90 },
    '180d': { label:'Últimos 180 dias', days:180 },
    '1y':   { label:'Último ano',       days:365 },
  };
  const pCfg = PERIODS[period] || PERIODS.week;

  let startDate;
  if (pCfg.days === 0) {
    startDate = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  } else if (pCfg.days === -1) {
    startDate = new Date(now.getFullYear(), now.getMonth()-1, 1);
    var endPrevMonth = new Date(now.getFullYear(), now.getMonth(), 0, 23, 59, 59);
  } else {
    startDate = new Date(now); startDate.setDate(now.getDate() - pCfg.days);
  }
  const inPeriod = (d) => {
    if (!d) return false;
    const dt = new Date(d);
    if (pCfg.days === -1) return dt >= startDate && dt <= endPrevMonth;
    return dt >= startDate;
  };

  const { students, bookings, tasks, feedbacks, growth } = data;
  const activeStudents = students.filter(s => !s.is_alumni);
  const alumniStudents = students.filter(s => !!s.is_alumni);

  // Métricas do período
  const newStudents     = students.filter(s => inPeriod(s.created_at));
  const periodBookings  = bookings.filter(b => inPeriod(b.scheduled_at));
  const periodTasks     = tasks.filter(t => inPeriod(t.created_at));
  const periodFeedbacks = feedbacks.filter(f => inPeriod(f.created_at));
  const periodCompletedTasks = periodTasks.filter(t => t.done);
  const periodTaskRate  = periodTasks.length > 0 ? Math.round((periodCompletedTasks.length / periodTasks.length) * 100) : 0;
  const allCompletedTasks = tasks.filter(t => t.done);
  const allTaskRate     = tasks.length > 0 ? Math.round((allCompletedTasks.length / tasks.length) * 100) : 0;

  // Calls por aluno (engajamento)
  const callsByStudent = {};
  periodBookings.forEach(b => { callsByStudent[b.student_id] = (callsByStudent[b.student_id]||0) + 1; });
  const studentsWithCalls = Object.keys(callsByStudent).length;
  const engagementRate = activeStudents.length > 0 ? Math.round((studentsWithCalls / activeStudents.length) * 100) : 0;

  // Rating médio do período
  const avgRating = periodFeedbacks.length > 0 ? (periodFeedbacks.reduce((a,f) => a + (f.rating||0), 0) / periodFeedbacks.length).toFixed(1) : '—';

  // Distribuição de planos
  const planDist = { FAST:0, GROWTH:0, ETERNITY:0 };
  activeStudents.forEach(s => { planDist[s.plan||'FAST']++; });

  // Top faturamento no período
  const allCallsByStudent = {};
  bookings.forEach(b => { allCallsByStudent[b.student_id] = (allCallsByStudent[b.student_id]||0) + 1; });
  const revenueByStudent = {};
  (growth || []).filter(g => inPeriod(g.created_at)).forEach(g => {
    revenueByStudent[g.student_id] = (revenueByStudent[g.student_id]||0) + Number(g.gross_revenue||0);
  });
  const topRevenue = students.filter(s => revenueByStudent[s.id] > 0).map(s => ({
    ...s,
    revenue: revenueByStudent[s.id] || 0,
  })).sort((a,b) => b.revenue - a.revenue).slice(0,5);

  // Expirados / expirando
  const expired = activeStudents.filter(s => s.plan_expires_at && new Date(s.plan_expires_at) < now).length;
  const expSoon = activeStudents.filter(s => { if(!s.plan_expires_at) return false; const d=Math.ceil((new Date(s.plan_expires_at)-now)/86400000); return d>=0&&d<=7; }).length;

  const planColors = { FAST:'#6b7280', GROWTH:'#f59e0b', ETERNITY:'#a855f7' };

  const statCard = (val, label, icon, color) => `
    <div class="stat-card">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px">
        <div style="width:34px;height:34px;border-radius:9px;background:${color}22;border:1px solid ${color}33;display:flex;align-items:center;justify-content:center">${ic(icon,15,`color:${color}`)}</div>
      </div>
      <div class="stat-val">${val}</div>
      <div class="stat-lbl">${label}</div>
    </div>`;

  const barWidth = (val, max) => max > 0 ? Math.max(4, Math.round((val/max)*100)) : 4;

  return `
  <div style="padding:28px 32px;max-width:900px">

      <div>
        <div class="lbl">MÉTRICAS</div>
        <h1 class="ph1">Analytics</h1>
        <p class="sub" style="margin-top:4px">${pCfg.label}</p>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <!-- Period selector -->
        <select onchange="S.analytics.period=this.value;document.getElementById('pc').innerHTML=renderPage('analytics');lucide.createIcons()" style="padding:8px 14px;border-radius:9px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:#F7F7F7;font-family:inherit;outline:none;color-scheme:dark">
          ${Object.entries(PERIODS).map(([k,v]) => `<option value="${k}" ${period===k?'selected':''}>${v.label}</option>`).join('')}
        </select>
        <!-- Export -->
        <button onclick="exportAnalyticsCSV()" style="padding:8px 14px;border-radius:9px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid rgba(34,197,94,.2);background:rgba(34,197,94,.06);color:#22c55e;font-family:inherit;display:flex;align-items:center;gap:6px;white-space:nowrap;transition:all .15s" onmouseenter="this.style.background='rgba(34,197,94,.12)'" onmouseleave="this.style.background='rgba(34,197,94,.06)'">
          ${ic('download',12,'color:#22c55e')} Exportar CSV
        </button>
      </div>
    </div>

    <!-- KPIs do período -->
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px" class="fu1">
      ${statCard(newStudents.length, 'Novos Alunos', 'user-plus', '#3b82f6')}
      ${statCard(periodBookings.length, 'Calls Realizadas', 'calendar-days', '#7022BB')}
      ${statCard(periodTasks.length, 'Tarefas Criadas', 'check-square', '#22c55e')}
      ${statCard(periodFeedbacks.length, 'Feedbacks', 'message-square', '#f59e0b')}
    </div>

    <!-- Métricas gerais -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px" class="fu2">
      <div class="stat-card" style="text-align:center">
        <div class="stat-val" style="font-size:28px">${periodTaskRate}%</div>
        <div class="stat-lbl">Conclusão de Tarefas (período)</div>
        <div style="margin-top:8px;background:rgba(255,255,255,.06);border-radius:6px;height:6px;overflow:hidden">
          <div style="width:${periodTaskRate}%;height:100%;background:#22c55e;border-radius:6px;transition:width .3s"></div>
        </div>
        <div style="font-size:10px;color:rgba(247,247,247,.3);margin-top:4px">${periodCompletedTasks.length} de ${periodTasks.length} · geral ${allTaskRate}%</div>
      </div>
      <div class="stat-card" style="text-align:center">
        <div class="stat-val" style="font-size:28px">${engagementRate}%</div>
        <div class="stat-lbl">Engajamento (alunos com calls)</div>
        <div style="margin-top:8px;background:rgba(255,255,255,.06);border-radius:6px;height:6px;overflow:hidden">
          <div style="width:${engagementRate}%;height:100%;background:#7022BB;border-radius:6px;transition:width .3s"></div>
        </div>
        <div style="font-size:10px;color:rgba(247,247,247,.3);margin-top:4px">${studentsWithCalls} de ${activeStudents.length} alunos</div>
      </div>
      <div class="stat-card" style="text-align:center">
        <div class="stat-val" style="font-size:28px">${avgRating}</div>
        <div class="stat-lbl">Nota Média (período)</div>
        <div style="display:flex;justify-content:center;gap:3px;margin-top:8px">${avgRating !== '—' ? starsHtml(Math.round(parseFloat(avgRating))) : '<span style="color:rgba(247,247,247,.15);font-size:11px">Sem feedbacks</span>'}</div>
        <div style="font-size:10px;color:rgba(247,247,247,.3);margin-top:4px">${periodFeedbacks.length} avaliações no período</div>
      </div>
    </div>

    <!-- Distribuição de planos + Alertas -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px">
      <div class="stat-card">
        <div style="font-size:10px;font-weight:700;color:rgba(247,247,247,.4);letter-spacing:1px;margin-bottom:14px">DISTRIBUIÇÃO DE PLANOS</div>
        ${['FAST','GROWTH','ETERNITY'].map(p => {
          const count = planDist[p];
          const pct = activeStudents.length > 0 ? Math.round((count/activeStudents.length)*100) : 0;
          const c = planColors[p];
          return `<div style="margin-bottom:10px">
            <div style="display:flex;justify-content:space-between;margin-bottom:4px">
              <span style="font-size:11px;font-weight:700;color:${c}">${p}</span>
              <span style="font-size:11px;color:rgba(247,247,247,.4)">${count} (${pct}%)</span>
            </div>
            <div style="background:rgba(255,255,255,.06);border-radius:5px;height:6px;overflow:hidden">
              <div style="width:${barWidth(count,activeStudents.length)}%;height:100%;background:${c};border-radius:5px;transition:width .3s"></div>
            </div>
          </div>`;
        }).join('')}
        <div style="display:flex;justify-content:space-between;margin-top:12px;padding-top:10px;border-top:1px solid rgba(255,255,255,.06)">
          <span style="font-size:11px;color:rgba(247,247,247,.3)">${activeStudents.length} ativos</span>
          <span style="font-size:11px;color:rgba(247,247,247,.3)">${alumniStudents.length} antigos</span>
        </div>
      </div>
      <div class="stat-card">
        <div style="font-size:10px;font-weight:700;color:rgba(247,247,247,.4);letter-spacing:1px;margin-bottom:14px">ALERTAS</div>
        <div style="display:flex;flex-direction:column;gap:10px">
          <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:${expired>0?'rgba(239,68,68,.08)':'rgba(34,197,94,.06)'};border:1px solid ${expired>0?'rgba(239,68,68,.18)':'rgba(34,197,94,.12)'};border-radius:10px">
            ${ic(expired>0?'alert-circle':'check-circle',14,`color:${expired>0?'#f87171':'#22c55e'}`)}
            <div style="flex:1">
              <div style="font-size:12px;font-weight:700;color:${expired>0?'#f87171':'#22c55e'}">${expired > 0 ? expired+' plano'+(expired!==1?'s':'')+' expirado'+(expired!==1?'s':'') : 'Nenhum plano expirado'}</div>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:${expSoon>0?'rgba(245,158,11,.08)':'rgba(34,197,94,.06)'};border:1px solid ${expSoon>0?'rgba(245,158,11,.18)':'rgba(34,197,94,.12)'};border-radius:10px">
            ${ic(expSoon>0?'clock':'check-circle',14,`color:${expSoon>0?'#f59e0b':'#22c55e'}`)}
            <div style="flex:1">
              <div style="font-size:12px;font-weight:700;color:${expSoon>0?'#f59e0b':'#22c55e'}">${expSoon > 0 ? expSoon+' expira'+(expSoon!==1?'m':'')+' em 7 dias' : 'Sem expirações próximas'}</div>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:10px">
            ${ic('users',14,'color:rgba(247,247,247,.4)')}
            <div style="flex:1">
              <div style="font-size:12px;font-weight:700;color:rgba(247,247,247,.5)">${activeStudents.filter(s=>!allCallsByStudent[s.id]).length} aluno(s) sem nenhuma call</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Top Faturamento -->
    <div class="stat-card" style="margin-bottom:24px">
      <div style="font-size:10px;font-weight:700;color:rgba(247,247,247,.4);letter-spacing:1px;margin-bottom:14px">ALUNOS QUE MAIS FATURARAM NO PERÍODO</div>
      <div style="display:flex;flex-direction:column;gap:6px">
        ${topRevenue.length === 0
          ? `<div style="text-align:center;padding:20px;color:rgba(247,247,247,.2);font-size:12px">Nenhum faturamento registrado no período</div>`
          : topRevenue.map((s,i) => {
            const c = planColors[s.plan||'FAST'];
            const rev = 'US$ ' + s.revenue.toLocaleString('en-US',{minimumFractionDigits:2});
            return `<div style="display:flex;align-items:center;gap:12px;padding:8px 10px;background:rgba(255,255,255,.02);border-radius:9px">
              <span style="font-size:12px;font-weight:900;color:rgba(247,247,247,.2);width:18px;text-align:center">${i+1}</span>
              ${avatar(s.full_name||s.email||'?',32)}
              <div style="flex:1;min-width:0">
                <div style="font-weight:700;font-size:12px;color:#F7F7F7;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.full_name||'—'}</div>
                <div style="font-size:10px;color:rgba(247,247,247,.3)">${rev}</div>
              </div>
              <span style="font-size:9px;font-weight:700;color:${c};background:${c}18;border:1px solid ${c}30;border-radius:5px;padding:2px 7px">${s.plan||'FAST'}</span>
            </div>`;
          }).join('')}
      </div>
    </div>

  </div>

  </div>`;
}

function exportAnalyticsCSV() {
  const { period, data } = S.analytics;
  if (!data) return;
  const now = new Date();
  const PERIODS = {
    day:{label:'Hoje',days:0}, week:{label:'Ultimos_7_dias',days:7}, month:{label:'Ultimos_30_dias',days:30},
    prev_month:{label:'Mes_passado',days:-1}, '90d':{label:'Ultimos_90_dias',days:90}, '180d':{label:'Ultimos_180_dias',days:180}, '1y':{label:'Ultimo_ano',days:365},
  };
  const pCfg = PERIODS[period] || PERIODS.week;
  let startDate;
  if (pCfg.days === 0) { startDate = new Date(now.getFullYear(), now.getMonth(), now.getDate()); }
  else if (pCfg.days === -1) { startDate = new Date(now.getFullYear(), now.getMonth()-1, 1); var endPM = new Date(now.getFullYear(), now.getMonth(), 0, 23, 59, 59); }
  else { startDate = new Date(now); startDate.setDate(now.getDate() - pCfg.days); }
  const inP = (d) => { if(!d) return false; const dt=new Date(d); if(pCfg.days===-1) return dt>=startDate&&dt<=endPM; return dt>=startDate; };

  const { students, bookings, tasks, feedbacks, growth } = data;
  const revByStudent = {};
  (growth||[]).filter(g => inP(g.created_at)).forEach(g => { revByStudent[g.student_id] = (revByStudent[g.student_id]||0) + Number(g.gross_revenue||0); });
  const rows = [['Aluno','Email','Plano','Status','Faturamento (USD)','Calls no Período','Tarefas Feitas','Tarefas Total','Feedbacks','Nota Média','Expiração']];
  students.forEach(s => {
    const pCalls = bookings.filter(b => b.student_id === s.id && inP(b.scheduled_at)).length;
    const sTasks = tasks.filter(t => t.student_id === s.id);
    const sDone  = sTasks.filter(t => t.done).length;
    const sFb    = feedbacks.filter(f => f.student_id === s.id && inP(f.created_at));
    const sAvg   = sFb.length > 0 ? (sFb.reduce((a,f)=>a+(f.rating||0),0)/sFb.length).toFixed(1) : '';
    rows.push([
      s.full_name||'', s.email||'', s.plan||'FAST', s.is_alumni?'Antigo':'Ativo',
      (revByStudent[s.id]||0).toFixed(2), pCalls, sDone, sTasks.length, sFb.length, sAvg, s.plan_expires_at||'',
    ]);
  });
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `analytics_${pCfg.label}_${pad(now.getDate())}${pad(now.getMonth()+1)}${now.getFullYear()}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('CSV exportado!', 'success');
}

async function loadAuditLog() {
  if (S.audit.loaded) return;
  S.audit.loading = true;
  const since = new Date(); since.setDate(since.getDate() - 30);
  const { data } = await SB.from('audit_log').select('*').gte('created_at', since.toISOString()).order('created_at', { ascending: false });
  S.audit.list = data || [];
  S.audit.loaded = true;
  S.audit.loading = false;
}

function selectAuditDate(dateKey) {
  S.audit.selectedDate = S.audit.selectedDate === dateKey ? '' : dateKey;
  document.getElementById('pc').innerHTML = renderPage('audit');
  lucide.createIcons();
}

function pageAudit() {
  const list = S.audit.list;
  const sel = S.audit.selectedDate;
  const pad2 = n => String(n).padStart(2,'0');
  const fmtTime = dt => { const d=new Date(dt); return `${pad2(d.getHours())}:${pad2(d.getMinutes())}`; };
  const actionLabels = {
    move_to_alumni:'Movido para Antigos', restore_student:'Restaurado como Ativo',
    delete_student:'Aluno Excluído', bulk_move_alumni:'Mover em Lote (Antigos)',
    bulk_delete:'Exclusão em Lote', upgrade_plan:'Plano Alterado', edit_student:'Perfil Editado',
  };
  const actionColors = {
    move_to_alumni:'#f59e0b', restore_student:'#22c55e', delete_student:'#f87171',
    bulk_move_alumni:'#f59e0b', bulk_delete:'#f87171', upgrade_plan:'#a855f7', edit_student:'#3b82f6',
  };
  const actionIcons = {
    move_to_alumni:'user-minus', restore_student:'user-check', delete_student:'trash-2',
    bulk_move_alumni:'users', bulk_delete:'trash-2', upgrade_plan:'arrow-up-circle', edit_student:'edit-3',
  };

  // Agrupar por data
  const grouped = {};
  list.forEach(l => {
    const d = new Date(l.created_at);
    const key = `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(l);
  });

  const WEEKDAYS_SHORT = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const MONTHS_FULL = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const today = new Date();
  const todayKey = `${today.getFullYear()}-${pad2(today.getMonth()+1)}-${pad2(today.getDate())}`;

  // Montar grid do mês atual e anterior (cobrindo 30 dias)
  // Mostrar o mês que contém a maioria dos últimos 30 dias
  const calMonth = today.getMonth();
  const calYear = today.getFullYear();
  const prevMonth = calMonth === 0 ? 11 : calMonth - 1;
  const prevYear = calMonth === 0 ? calYear - 1 : calYear;

  const buildMonthGrid = (yr, mo) => {
    const firstDay = new Date(yr, mo, 1).getDay();
    const daysInMonth = new Date(yr, mo + 1, 0).getDate();
    const cells = [];
    for (let i = 0; i < firstDay; i++) cells.push(null);
    for (let d = 1; d <= daysInMonth; d++) cells.push(d);
    return { cells, daysInMonth, label: `${MONTHS_FULL[mo]} ${yr}` };
  };

  const thirtyAgo = new Date(today); thirtyAgo.setDate(today.getDate() - 30);

  const renderMonth = (yr, mo) => {
    const mg = buildMonthGrid(yr, mo);
    return `
      <div style="margin-bottom:20px">
        <div style="font-size:13px;font-weight:800;color:#F7F7F7;margin-bottom:10px;text-align:center">${mg.label}</div>
        <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">
          ${WEEKDAYS_SHORT.map(w => `<div style="text-align:center;font-size:9px;font-weight:700;color:rgba(247,247,247,.3);padding:4px 0">${w}</div>`).join('')}
          ${mg.cells.map(d => {
            if (d === null) return `<div></div>`;
            const dk = `${yr}-${pad2(mo+1)}-${pad2(d)}`;
            const dt = new Date(yr, mo, d);
            const inRange = dt >= thirtyAgo && dt <= today;
            const count = (grouped[dk]||[]).length;
            const isToday = dk === todayKey;
            const isSel = dk === sel;
            if (!inRange) {
              return `<div style="text-align:center;padding:6px 0;font-size:11px;color:rgba(247,247,247,.1);border-radius:8px">${d}</div>`;
            }
            const bg = isSel ? 'rgba(112,34,187,.5)' : isToday ? 'rgba(112,34,187,.15)' : 'transparent';
            const border = isSel ? '1px solid rgba(112,34,187,.7)' : isToday ? '1px solid rgba(112,34,187,.3)' : '1px solid transparent';
            return `<div onclick="selectAuditDate('${dk}')" style="text-align:center;padding:6px 0;font-size:11px;font-weight:${count>0?'800':'500'};color:${count>0?'#F7F7F7':'rgba(247,247,247,.35)'};border-radius:8px;cursor:pointer;background:${bg};border:${border};transition:all .15s;position:relative" onmouseenter="this.style.background='rgba(112,34,187,.25)'" onmouseleave="this.style.background='${bg}'">
              ${d}
              ${count > 0 ? `<div style="position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:#a855f7"></div>` : ''}
            </div>`;
          }).join('')}
        </div>
      </div>`;
  };

  // Ações do dia selecionado
  const selItems = sel ? (grouped[sel] || []) : [];
  const selLabel = sel ? (() => {
    const [y,m,d] = sel.split('-').map(Number);
    return `${d} de ${MONTHS_FULL[m-1]} de ${y}`;
  })() : '';

  const totalActions = list.length;

  return `
  <div style="padding:28px 32px;max-width:800px">
    <div class="fu" style="margin-bottom:24px">
      <div class="lbl">AUDITORIA</div>
      <h1 class="ph1">Histórico de Alterações</h1>
      <p class="sub">Últimos 30 dias · ${totalActions} ação${totalActions!==1?'ões':''}</p>

    <!-- Calendário -->

    <!-- Expirações -->

/* ═══════════════════════════════════════════════════════════════════════════════
   PAGE: DISPONIBILIDADE
═══════════════════════════════════════════════════════════════════════════════ */
function pageAvailability() {
  const { slots, blocked, yr, mo } = S.avail;

  // Build slots map: "dow|time" -> slot object
  const slotMap = {};
  for (const s of slots) {
    slotMap[`${s.day_of_week}|${(s.slot_time||'').slice(0,5)}`] = s;
  }

  // Calendar data for date blocking
  const daysInMonth = getDays(yr, mo);
  const firstDow = getFirst(yr, mo); // 0=dom
  const cells = [...Array(firstDow).fill(null), ...Array.from({length:daysInMonth},(_,i)=>i+1)];
  while (cells.length % 7 !== 0) cells.push(null);
  const blockedDates = new Set(blocked.map(b => b.blocked_date));
  const today = new Date(); today.setHours(0,0,0,0);

  return `
  <div class="avail-wrap" style="padding:28px 32px;max-width:900px">
    <div class="fu" style="margin-bottom:28px">
      <div class="lbl">DISPONIBILIDADE</div>
      <h1 class="ph1">Grade de Horários</h1>
      <p class="sub" style="margin-top:4px">Clique em um slot para ativar/desativar. As mudanças são salvas imediatamente.</p>
    </div>

    <!-- Slot grid -->
    <div class="card avail-card fu1" style="padding:24px;margin-bottom:28px;overflow-x:auto">
      <div style="font-weight:800;font-size:13px;color:#F7F7F7;margin-bottom:16px;display:flex;align-items:center;gap:8px">
        ${ic('grid',15,'color:#7022BB')} Horários Semanais Recorrentes
      </div>
      <div style="min-width:480px">
        <!-- Header row -->
        <div style="display:grid;grid-template-columns:80px repeat(5,1fr);gap:5px;margin-bottom:5px">
          <div></div>
          ${ADMIN_DAYS.map(d=>`<div class="slot-cell slot-header">${d.l}</div>`).join('')}
        </div>
        <!-- Time rows -->
        ${ALL_SLOTS.map(time=>`
          <div style="display:grid;grid-template-columns:80px repeat(5,1fr);gap:5px;margin-bottom:5px">
            <div class="slot-cell slot-time">${time}</div>
            ${ADMIN_DAYS.map(({dow})=>{
              const key = `${dow}|${time}`;
              const s = slotMap[key];
              const on = s?.active ?? false;
              return `<div class="slot-cell${on?' on':''}" data-action="toggle-slot" data-dow="${dow}" data-time="${time}">
                ${on ? ic('check',14,'color:#a855f7') : ''}
              </div>`;
            }).join('')}
          </div>
        `).join('')}
      </div>
      <div style="margin-top:16px;display:flex;gap:16px;font-size:11px;color:rgba(247,247,247,.3)">
        <div style="display:flex;align-items:center;gap:6px"><div style="width:12px;height:12px;border-radius:4px;background:rgba(112,34,187,0.2);border:1px solid var(--purple)"></div>Ativo</div>
        <div style="display:flex;align-items:center;gap:6px"><div style="width:12px;height:12px;border-radius:4px;background:var(--faint);border:1px solid var(--border)"></div>Inativo</div>
      </div>
    </div>

    <!-- Date blocker calendar -->
    <div class="card avail-card fu2" style="padding:24px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px">
        <div>
          <div style="font-weight:800;font-size:13px;color:#F7F7F7;margin-bottom:4px;display:flex;align-items:center;gap:8px">
            ${ic('calendar-x',15,'color:#f87171')} Datas Bloqueadas
          </div>
          <div style="font-size:11px;color:rgba(247,247,247,.3)">Clique em um dia para bloquear/desbloquear</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <button data-action="prev-cal-mo" class="btn-ghost" style="padding:6px 10px">${ic('chevron-left',14)}</button>
          <div style="font-weight:700;font-size:13px;color:#F7F7F7;min-width:140px;text-align:center">${MONTHS[mo]} ${yr}</div>
          <button data-action="next-cal-mo" class="btn-ghost" style="padding:6px 10px">${ic('chevron-right',14)}</button>
        </div>
      </div>
      <!-- Weekday headers -->
      <div class="cal-grid" style="margin-bottom:4px">
        ${['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'].map(d=>`<div style="text-align:center;font-size:9px;font-weight:700;letter-spacing:1.5px;color:rgba(247,247,247,.2);padding:4px 0">${d}</div>`).join('')}
      </div>
      <!-- Days -->
      <div class="cal-grid">
        ${cells.map((day,i)=>{
          if (!day) return `<div class="cal-cell empty"></div>`;
          const dateStr = `${yr}-${pad(mo+1)}-${pad(day)}`;
          const isBlock = blockedDates.has(dateStr);
          const isPast  = new Date(yr,mo,day) < today;
          const dow = (firstDow + day - 1) % 7;
          const isWeekend = dow === 0 || dow === 6;
          return `<div class="cal-cell${isBlock?' blocked':''}${isPast?' past':''}${isWeekend?' past':''}"
            ${!isPast && !isWeekend ? `data-action="toggle-block" data-date="${dateStr}"` : ''}>
            <div class="cal-day">${day}</div>
            ${isBlock ? `<div style="font-size:8px;font-weight:700;color:#f87171;margin-top:3px">BLOQ.</div>` : ''}
          </div>`;
        }).join('')}
      </div>
      ${blocked.length > 0 ? `
        <div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--border)">
          <div style="font-size:10px;color:rgba(247,247,247,.3);font-weight:700;margin-bottom:8px">DIAS BLOQUEADOS NESTE MÊS</div>
          <div style="display:flex;flex-wrap:wrap;gap:6px">
            ${blocked.map(b=>`
              <div style="display:inline-flex;align-items:center;gap:6px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);border-radius:8px;padding:4px 10px;font-size:11px;color:#f87171;font-weight:600">
                ${fmtDateOnly(b.blocked_date)}
                <span data-action="toggle-block" data-date="${b.blocked_date}" style="cursor:pointer;opacity:.6;display:flex;align-items:center">${ic('x',11)}</span>
              </div>
            `).join('')}
          </div>
        </div>
      ` : ''}
    </div>
  </div>`;
}

/* ═══════════════════════════════════════════════════════════════════════════════
   PAGE: AGENDAMENTOS
═══════════════════════════════════════════════════════════════════════════════ */
function pageBookings() {
  const now = new Date().toISOString();
  const { list, filter, search } = S.bookings;
  const q = (search || '').toLowerCase().trim();
  const timeFiltered = filter === 'upcoming'
    ? list.filter(b => b.scheduled_at > now).sort((a,b) => a.scheduled_at > b.scheduled_at ? 1 : -1)
    : list.filter(b => b.scheduled_at <= now).sort((a,b) => a.scheduled_at < b.scheduled_at ? 1 : -1);
  const filtered = q
    ? timeFiltered.filter(b => {
        const name  = (b._sName  || '').toLowerCase();
        const email = (b._sEmail || '').toLowerCase();
        const title = (b.call_title || '').toLowerCase();
        return name.includes(q) || email.includes(q) || title.includes(q);
      })
    : timeFiltered;

  const totalFiltered = filtered.length;
  const { page: pg, perPage } = S.bookings;
  const totalPages = Math.max(1, Math.ceil(totalFiltered / perPage));
  const safePage = Math.min(pg, totalPages - 1);
  if (safePage !== pg) S.bookings.page = safePage;
  const paginated = filtered.slice(safePage * perPage, (safePage + 1) * perPage);

  return `
  <div style="padding:28px 32px;max-width:800px">
    <div class="fu" style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:14px">
      <div>
        <div class="lbl">AGENDAMENTOS</div>
        <h1 class="ph1">Calls Agendadas</h1>
      </div>
      <div style="display:flex;gap:6px">
        <button data-action="book-filter" data-v="upcoming"  class="${filter==='upcoming'?'btn-amber':'btn-ghost'}">Próximas</button>
        <button data-action="book-filter" data-v="past"      class="${filter==='past'?'btn-amber':'btn-ghost'}">Passadas</button>
      </div>
    </div>

    <div style="position:relative;margin-bottom:16px">
      <svg style="position:absolute;left:12px;top:50%;transform:translateY(-50%);pointer-events:none" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="rgba(247,247,247,0.3)" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input data-input="search-bookings" class="inp" placeholder="Buscar por aluno ou call..." value="${search||''}" style="padding-left:36px">
    </div>

    <div class="fu1" style="display:flex;flex-direction:column;gap:8px">
      ${totalFiltered === 0
        ? `<div class="trow" style="justify-content:center;color:rgba(247,247,247,.3);font-size:13px;gap:8px">${ic('calendar-x',16)} ${q ? 'Nenhum resultado para "'+search+'"' : 'Nenhum agendamento '+(filter==='upcoming'?'futuro':'passado')}</div>`
        : paginated.map(b=>{
            const sName = b._sName || 'Aluno';
            const isPast = b.scheduled_at <= now;
            return `<div class="trow">
              ${avatar(sName, 38)}
              <div style="flex:1;min-width:0">
                <div style="font-weight:700;font-size:13px;color:#F7F7F7;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${b.call_title || 'Call de Mentoria'}</div>
                <div style="font-size:11px;color:rgba(247,247,247,.35)">${sName}${b._sEmail && b._sEmail !== sName ? ` · <span style="color:rgba(247,247,247,.2)">${b._sEmail}</span>` : ''} · ${fmtDate(b.scheduled_at)}</div>
              </div>
              <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
                ${b.meet_link ? `<a href="${b.meet_link}" target="_blank" style="display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;color:#3b82f6;text-decoration:none">${ic('video',12,'color:#3b82f6')} Meet</a>` : ''}
                <span class="tag ${isPast?'tag-purple':'tag-green'}">${isPast?'REALIZADO':'CONFIRMADO'}</span>
              </div>
            </div>`;
          }).join('')}
    </div>

    ${totalPages > 1 ? `
    <div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-top:16px">
      <button data-action="bookings-page" data-pg="${safePage-1}" ${safePage===0?'disabled':''} style="padding:6px 12px;border-radius:7px;font-size:11px;font-weight:700;cursor:${safePage===0?'default':'pointer'};border:1px solid rgba(255,255,255,.1);background:transparent;color:${safePage===0?'rgba(247,247,247,.15)':'rgba(247,247,247,.5)'};font-family:inherit">${ic('chevron-left',12)} Anterior</button>
      <span style="font-size:11px;color:rgba(247,247,247,.35);font-weight:600">${safePage+1} de ${totalPages}</span>
      <button data-action="bookings-page" data-pg="${safePage+1}" ${safePage>=totalPages-1?'disabled':''} style="padding:6px 12px;border-radius:7px;font-size:11px;font-weight:700;cursor:${safePage>=totalPages-1?'default':'pointer'};border:1px solid rgba(255,255,255,.1);background:transparent;color:${safePage>=totalPages-1?'rgba(247,247,247,.15)':'rgba(247,247,247,.5)'};font-family:inherit">Próximo ${ic('chevron-right',12)}</button>
    </div>
    <div style="text-align:center;margin-top:6px;font-size:10px;color:rgba(247,247,247,.2)">${totalFiltered} resultado${totalFiltered!==1?'s':''}</div>
    ` : ''}
  </div>`;
}

/* ═══════════════════════════════════════════════════════════════════════════════
   PAGE: ALUNOS
═══════════════════════════════════════════════════════════════════════════════ */
function pageStudents() {
  const { list, search, planFilter, showAlumni, selected } = S.students;
  const q = (search || '').toLowerCase().trim();

  const activeList  = list.filter(st => !st.is_alumni);
  const alumniList  = list.filter(st => !!st.is_alumni);

  // Se showAlumni, mostra só ex-alunos; senão filtra por plano nos ativos
  const base = showAlumni ? alumniList : activeList;
  let filtered = q
    ? base.filter(st => (st.full_name||'').toLowerCase().includes(q) || (st.email||'').toLowerCase().includes(q))
    : base;
  if (!showAlumni && planFilter) filtered = filtered.filter(st => (st.plan||'FAST') === planFilter);

  const totalFiltered = filtered.length;
  const { page: pg, perPage } = S.students;
  const totalPages = Math.max(1, Math.ceil(totalFiltered / perPage));
  const safePage = Math.min(pg, totalPages - 1);
  if (safePage !== pg) S.students.page = safePage;
  const paginated = filtered.slice(safePage * perPage, (safePage + 1) * perPage);

  const plans = ['FAST','GROWTH','ETERNITY'];
  const planCount = p => activeList.filter(s=>(s.plan||'FAST')===p).length;

  return `
  <div style="padding:28px 32px;max-width:800px">
    <div class="fu" style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:14px">
      <div>
        <div class="lbl">ALUNOS</div>
        <h1 class="ph1">${showAlumni ? alumniList.length + ' Antigo' + (alumniList.length!==1?'s':'') : activeList.length + ' Aluno' + (activeList.length!==1?'s':'')}</h1>
      </div>
      ${!showAlumni && ['super_admin','admin'].includes(S.currentRole) ? `<button data-action="open-modal" data-modal="new-student" class="btn-amber">${ic('user-plus',14)} Novo Aluno</button>` : ''}
    </div>

    <div style="position:relative;margin-bottom:10px">
      <svg style="position:absolute;left:12px;top:50%;transform:translateY(-50%);pointer-events:none" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="rgba(247,247,247,0.3)" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input data-input="search-students" class="inp" placeholder="Buscar por nome ou e-mail..." value="${search||''}" style="padding-left:36px">
    </div>

    <!-- Filtro por plano + Antigos Alunos na mesma linha -->
    <div style="display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;align-items:center">
      <button data-action="filter-plan" data-plan="" style="padding:5px 12px;border-radius:7px;font-size:10px;font-weight:700;cursor:pointer;border:1px solid ${!planFilter&&!showAlumni?'rgba(247,247,247,.4)':'rgba(255,255,255,.1)'};background:${!planFilter&&!showAlumni?'rgba(255,255,255,.1)':'transparent'};color:${!planFilter&&!showAlumni?'#F7F7F7':'rgba(247,247,247,.4)'}">TODOS (${activeList.length})</button>
      ${plans.map(p=>{
        const c=p==='ETERNITY'?'#a855f7':p==='GROWTH'?'#f59e0b':'#6b7280';
        const active=planFilter===p&&!showAlumni;
        return `<button data-action="filter-plan" data-plan="${p}" style="padding:5px 12px;border-radius:7px;font-size:10px;font-weight:700;cursor:pointer;border:1px solid ${active?c+'60':'rgba(255,255,255,.08)'};background:${active?c+'18':'transparent'};color:${active?c:'rgba(247,247,247,.4)'}">${p} (${planCount(p)})</button>`;
      }).join('')}
      <span style="width:1px;height:18px;background:rgba(255,255,255,.1);margin:0 4px"></span>
      <button data-action="toggle-alumni" data-alumni="${showAlumni?'0':'1'}" style="padding:5px 12px;border-radius:7px;font-size:10px;font-weight:700;cursor:pointer;border:1px solid ${showAlumni?'#f59e0b60':'rgba(255,255,255,.08)'};background:${showAlumni?'rgba(245,158,11,.12)':'transparent'};color:${showAlumni?'#f59e0b':'rgba(247,247,247,.4)'}">ANTIGOS ALUNOS (${alumniList.length})</button>
    </div>

    ${selected.length > 0 ? `
    <div style="display:flex;align-items:center;gap:10px;padding:10px 14px;margin-bottom:10px;background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.2);border-radius:10px;animation:fadeUp .2s ease">
      <span style="font-size:12px;font-weight:700;color:#f59e0b">${selected.length} selecionado${selected.length!==1?'s':''}</span>
      <div style="flex:1"></div>
      <button onclick="bulkMoveAlumni()" style="padding:6px 12px;border-radius:7px;font-size:10px;font-weight:700;cursor:pointer;border:1px solid rgba(245,158,11,.3);background:rgba(245,158,11,.1);color:#f59e0b;font-family:inherit;display:flex;align-items:center;gap:5px">
        ${ic('user-minus',12)} Mover para Antigos
      </button>
      <button onclick="bulkDeleteStudents()" style="padding:6px 12px;border-radius:7px;font-size:10px;font-weight:700;cursor:pointer;border:1px solid rgba(248,113,113,.3);background:rgba(248,113,113,.08);color:#f87171;font-family:inherit;display:flex;align-items:center;gap:5px">
        ${ic('trash-2',12)} Excluir
      </button>
      <button onclick="S.students.selected=[];document.getElementById('pc').innerHTML=pageStudents();lucide.createIcons()" style="padding:6px 10px;border-radius:7px;font-size:10px;font-weight:700;cursor:pointer;border:1px solid rgba(255,255,255,.1);background:transparent;color:rgba(247,247,247,.4);font-family:inherit">Cancelar</button>
    </div>` : ''}

    <div class="fu1" style="display:flex;flex-direction:column;gap:8px">
      ${totalFiltered === 0
        ? `<div class="trow" style="justify-content:center;color:rgba(247,247,247,.3);font-size:13px;gap:8px">${ic('users',16)} ${q ? 'Nenhum resultado para "'+search+'"' : showAlumni ? 'Nenhum antigo aluno registrado ainda' : 'Nenhum aluno cadastrado ainda'}</div>`
        : paginated.map(st=>{
            const planColor = st.plan==='ETERNITY'?'#a855f7':st.plan==='GROWTH'?'#f59e0b':'#6b7280';
            const planBg    = st.plan==='ETERNITY'?'rgba(168,85,247,0.12)':st.plan==='GROWTH'?'rgba(245,158,11,0.1)':'rgba(107,114,128,0.1)';
            const isSel = selected.includes(st.id);
            return `
            <div class="trow" style="cursor:pointer;transition:background .15s;${isSel?'background:rgba(245,158,11,.04);border-color:rgba(245,158,11,.2)':''}" onmouseenter="this.style.background='rgba(255,255,255,0.03)'" onmouseleave="this.style.background='${isSel?'rgba(245,158,11,.04)':''}'">
              <div onclick="event.stopPropagation();toggleStudentSelect('${st.id}')" style="width:20px;height:20px;border-radius:5px;border:2px solid ${isSel?'#f59e0b':'rgba(255,255,255,.15)'};background:${isSel?'#f59e0b':'transparent'};display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .15s">
                ${isSel?'<svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round"><path d="M4 12 9 17 20 6"/></svg>':''}
              </div>
              <div data-action="view-student" data-id="${st.id}" style="display:flex;align-items:center;gap:14px;flex:1;min-width:0">
                ${avatar(st.full_name || st.email || '?', 38)}
                <div style="flex:1;min-width:0">
                  <div style="font-weight:700;font-size:13px;color:#F7F7F7;margin-bottom:2px">${st.full_name || '—'}</div>
                  <div style="font-size:11px;color:rgba(247,247,247,.35)">${st.email || '—'}</div>
                </div>
              </div>
              ${st.is_alumni
                ? `<span style="font-size:9px;font-weight:700;letter-spacing:.8px;color:rgba(247,247,247,.3);background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:7px;padding:4px 10px;flex-shrink:0">ANTIGO</span>`
                : `<span style="font-size:10px;font-weight:800;letter-spacing:1px;color:${planColor};background:${planBg};border:1px solid ${planColor}40;border-radius:7px;padding:4px 10px;flex-shrink:0">${st.plan || 'FAST'}</span>`}
            </div>`;
          }).join('')}
    </div>

    ${totalPages > 1 ? `
    <div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-top:16px">
      <button data-action="students-page" data-pg="${safePage-1}" ${safePage===0?'disabled':''} style="padding:6px 12px;border-radius:7px;font-size:11px;font-weight:700;cursor:${safePage===0?'default':'pointer'};border:1px solid rgba(255,255,255,.1);background:transparent;color:${safePage===0?'rgba(247,247,247,.15)':'rgba(247,247,247,.5)'};font-family:inherit">${ic('chevron-left',12)} Anterior</button>
      <span style="font-size:11px;color:rgba(247,247,247,.35);font-weight:600">${safePage+1} de ${totalPages}</span>
      <button data-action="students-page" data-pg="${safePage+1}" ${safePage>=totalPages-1?'disabled':''} style="padding:6px 12px;border-radius:7px;font-size:11px;font-weight:700;cursor:${safePage>=totalPages-1?'default':'pointer'};border:1px solid rgba(255,255,255,.1);background:transparent;color:${safePage>=totalPages-1?'rgba(247,247,247,.15)':'rgba(247,247,247,.5)'};font-family:inherit">Próximo ${ic('chevron-right',12)}</button>
    </div>
    <div style="text-align:center;margin-top:6px;font-size:10px;color:rgba(247,247,247,.2)">${totalFiltered} resultado${totalFiltered!==1?'s':''}</div>
    ` : ''}
  </div>`;
}

/* ═══════════════════════════════════════════════════════════════════════════════
   PAGE: TAREFAS
═══════════════════════════════════════════════════════════════════════════════ */
function pageTasks() {
  const { list, filterStudentId, search, sort } = S.tasks;
  const { list: stList } = S.students;
  const q = search.toLowerCase();
  let filtered = list.filter(t => {
    if (!q) return true;
    const sName = (t.student_profiles?.full_name || t.student_profiles?.email || '').toLowerCase();
    return t.title.toLowerCase().includes(q) || sName.includes(q) || (t.mentor_note||'').toLowerCase().includes(q);
  });
  if (sort === 'az') filtered.sort((a,b) => (a.title||'').localeCompare(b.title||''));
  else if (sort === 'oldest') filtered.sort((a,b) => new Date(a.created_at) - new Date(b.created_at));
  else filtered.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));

  return `
  <div style="padding:28px 32px;max-width:800px">
    <div class="fu" style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:14px">
      <div>
        <div class="lbl">TAREFAS</div>
        <h1 class="ph1">Gestão de Tarefas</h1>
      </div>
      <div style="display:flex;gap:8px">
        <button data-action="refresh-tasks" class="btn-ghost" title="Atualizar">${ic('refresh-cw',14)}</button>
        <button data-action="open-modal" data-modal="new-task" class="btn-amber">
          ${ic('plus',14)} Nova Tarefa
        </button>
      </div>
    </div>

    <!-- Search + Filter + Sort -->
    <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap">
      <div style="flex:1;min-width:180px;position:relative">
        <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);pointer-events:none;color:rgba(247,247,247,.3)">${ic('search',14)}</span>
        <input data-action="task-search" class="inp" placeholder="Buscar tarefa ou aluno…" value="${search}" style="padding-left:34px"/>
      </div>
      <select data-action="task-filter" class="inp" style="max-width:220px">
        <option value="">Todos os alunos</option>
        ${stList.map(s=>`<option value="${s.id}" ${filterStudentId===s.id?'selected':''}>${s.full_name||s.email}</option>`).join('')}
      </select>
      <select data-action="task-sort" class="inp" style="max-width:170px">
        <option value="recent" ${sort==='recent'?'selected':''}>Mais recentes</option>
        <option value="oldest" ${sort==='oldest'?'selected':''}>Mais antigos</option>
        <option value="az" ${sort==='az'?'selected':''}>A – Z</option>
      </select>
    </div>

    <!-- Task list -->
    <div class="fu2" style="display:flex;flex-direction:column;gap:8px">
      ${filtered.length === 0
        ? `<div class="trow" style="justify-content:center;color:rgba(247,247,247,.3);font-size:13px;gap:8px">${ic('check-square',16)} Nenhuma tarefa encontrada</div>`
        : filtered.map(t=>{
            const sName = t.student_profiles?.full_name || t.student_profiles?.email || 'Aluno';
            return `<div class="trow" style="opacity:${t.done?.5:1}">
              <div class="hw-check${t.done?' done':''}">
                ${t.done?`<svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round"><path d="M4 12 9 17 19 7"/></svg>`:''}
              </div>
              <div style="flex:1;min-width:0">
                <div style="font-weight:600;font-size:13px;color:#F7F7F7;text-decoration:${t.done?'line-through':'none'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px">${t.title}</div>
                <div style="font-size:10px;color:rgba(247,247,247,.3);display:flex;align-items:center;gap:8px">
                  ${avatar(sName,20)} ${sName}
                  ${t.call_number ? `· Call ${t.call_number}` : ''}
                  ${t.mentor_note ? `· <span style="font-style:italic">${t.mentor_note}</span>` : ''}
                </div>
              </div>
              <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
                <span class="tag ${t.done?'tag-green':'tag-amber'}">${t.done?'FEITO':'PENDENTE'}</span>
                <button data-action="delete-task" data-id="${t.id}" class="btn-danger">${ic('trash-2',11)}</button>
              </div>
            </div>`;
          }).join('')}
    </div>
  </div>`;
}

/* ═══════════════════════════════════════════════════════════════════════════════
   PAGE: COLABORADORES
═══════════════════════════════════════════════════════════════════════════════ */
async function loadCollaborators() {
  const { data } = await SB.from('collaborators').select('*').order('created_at', { ascending: true });
  S.collaborators.list = data || [];
}

function pageCollaborators() {

  const filtered = q
    ? list.filter(c => (c.name||'').toLowerCase().includes(q) || (c.email||'').toLowerCase().includes(q))

        <div class="lbl">EQUIPE</div>
        <h1 class="ph1">${list.length} Colaborador${list.length!==1?'es':''}</h1>

      </div>
      <button data-action="open-modal" data-modal="new-collab" class="btn-amber" style="align-self:flex-start">
        ${ic('user-plus',14)} Novo Colaborador
