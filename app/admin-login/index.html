<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <meta name="theme-color" content="#050508"/>
  <meta name="robots" content="noindex,nofollow"/>
  <title>Admin · Eternity Academy</title>
  <link rel="icon" type="image/png" href="../medias/eternityfavicon.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:  #050508;
      --white:  #F7F7F7;
      --amber:  #f59e0b;
      --amber2: #92400e;
      --border: rgba(245,158,11,0.22);
      --font:   'Red Hat Display', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--black);
      color: var(--white);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    .page {
      display: flex;
      height: 100vh;
      width: 100vw;
      align-items: center;
      justify-content: center;
    }

    /* ─── CARD ─── */
    .card {
      width: 100%;
      max-width: 420px;
      padding: 48px 40px 40px;
      background: #0d0d0f;
      border: 1px solid rgba(245,158,11,0.15);
      border-radius: 24px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6), 0 0 60px rgba(245,158,11,0.04);
      animation: fadeUp .32s ease;
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(14px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* ─── HEADER ─── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(245,158,11,0.1);
      border: 1px solid rgba(245,158,11,0.25);
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 1.5px;
      color: var(--amber);
    }

    .title {
      font-weight: 900;
      font-size: 24px;
      letter-spacing: -0.5px;
      color: var(--white);
      margin-bottom: 6px;
    }
    .subtitle {
      font-size: 13px;
      color: rgba(247,247,247,.35);
      margin-bottom: 32px;
      line-height: 1.5;
    }

    /* ─── FORM ─── */
    .field { margin-bottom: 16px; }
    .field-label {
      display: block;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 2px;
      color: rgba(247,247,247,.28);
      margin-bottom: 7px;
    }
    .input-wrap { position: relative; }
    .ea-input {
      width: 100%;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(245,158,11,.15);
      border-radius: 12px;
      padding: 14px 16px;
      color: var(--white);
      font-size: 14px;
      font-family: var(--font);
      font-weight: 500;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .ea-input::placeholder { color: rgba(247,247,247,.18); }
    .ea-input:focus {
      border-color: var(--amber);
      box-shadow: 0 0 0 3px rgba(245,158,11,.1);
    }
    .ea-input.pw { padding-right: 48px; }

    .pw-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(247,247,247,.3);
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      transition: color .15s;
    }
    .pw-toggle:hover { color: var(--white); }

    /* ─── BUTTON ─── */
    .ea-btn {
      width: 100%;
      padding: 15px;
      border-radius: 13px;
      background: linear-gradient(135deg, #92400e, #f59e0b);
      color: var(--white);
      border: none;
      font-family: var(--font);
      font-weight: 900;
      font-size: 13px;
      letter-spacing: 2px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(245,158,11,.25);
      transition: transform .15s, box-shadow .15s, opacity .15s;
      margin-top: 8px;
    }
    .ea-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 8px 28px rgba(245,158,11,.35);
    }
    .ea-btn:active:not(:disabled) { transform: translateY(0); }
    .ea-btn:disabled, .ea-btn.loading {
      opacity: .55;
      cursor: not-allowed;
      transform: none;
    }

    /* ─── ERROR ─── */
    .error-banner {
      display: none;
      align-items: flex-start;
      gap: 10px;
      background: rgba(239,68,68,.08);
      border: 1px solid rgba(239,68,68,.2);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 12px;
      color: #f87171;
      margin-bottom: 18px;
      line-height: 1.5;
    }
    .error-banner svg { flex-shrink: 0; margin-top: 1px; }

    /* ─── BACK LINK ─── */
    .back-link {
      display: block;
      text-align: center;
      margin-top: 24px;
      font-size: 11px;
      color: rgba(247,247,247,.25);
      text-decoration: none;
      transition: color .15s;
    }
    .back-link:hover { color: rgba(247,247,247,.5); }

    @media (max-width: 480px) {
      .card { padding: 36px 24px 32px; margin: 16px; border-radius: 20px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">

      <!-- Logo -->
      <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:28px">
        <img src="../medias/eahorizontalglow.png" alt="Eternity Academy" style="height:34px;width:auto;display:block"/>
        <div class="badge">
          <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          ADMINISTRADOR
        </div>
      </div>

      <div class="title">Acesso restrito</div>
      <div class="subtitle">Área exclusiva para administradores da plataforma.</div>

      <!-- Error -->
      <div class="error-banner" id="errorBanner">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="errorText"></span>
      </div>

      <!-- Form -->
      <form id="loginForm" autocomplete="on">

        <div class="field">
          <label class="field-label" for="email">E-MAIL</label>
          <div class="input-wrap">
            <input class="ea-input" type="email" id="email" name="email"
              placeholder="admin@eternity.com" autocomplete="email" required/>
          </div>
        </div>

        <div class="field">
          <label class="field-label" for="password">SENHA</label>
          <div class="input-wrap">
            <input class="ea-input pw" type="password" id="password" name="password"
              placeholder="••••••••" autocomplete="current-password" required/>
            <button type="button" class="pw-toggle" id="pwToggle" aria-label="Mostrar senha">
              <svg id="eyeOff" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              <svg id="eyeOpen" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="display:none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <button type="submit" class="ea-btn" id="btnSubmit">ENTRAR</button>
      </form>

      <a href="/login" class="back-link">← Acesso para alunos</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    var SUPABASE_URL  = 'https://subsagwkktjjujdfpavf.supabase.co';
    var SUPABASE_ANON = 'sb_publishable_Ln7neAZZMFVZ_yHU64DHHg_QV4ubdDy';
    var ADMIN_EMAIL   = 'academy@eternityholding.com';
    var REDIRECT_ADMIN = '/admin/index.html';

    var sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    var form        = document.getElementById('loginForm');
    var emailEl     = document.getElementById('email');
    var passEl      = document.getElementById('password');
    var pwToggle    = document.getElementById('pwToggle');
    var eyeOpen     = document.getElementById('eyeOpen');
    var eyeOff      = document.getElementById('eyeOff');
    var btnSubmit   = document.getElementById('btnSubmit');
    var errorBanner = document.getElementById('errorBanner');
    var errorText   = document.getElementById('errorText');

    /* Se já está logado → verifica acesso e redireciona */
    sb.auth.getSession().then(function(r) {
      if (!r.data || !r.data.session) return;
      var userEmail = r.data.session.user.email;
      if (userEmail === ADMIN_EMAIL) { window.location.replace(REDIRECT_ADMIN); return; }
      sb.from('collaborators').select('role').eq('email', userEmail).maybeSingle()
        .then(function(res) { if (res.data) window.location.replace(REDIRECT_ADMIN); });
    });

    function setLoading(on) {
      btnSubmit.disabled = on;
      btnSubmit.textContent = on ? 'ENTRANDO...' : 'ENTRAR';
      if (on) btnSubmit.classList.add('loading');
      else    btnSubmit.classList.remove('loading');
    }

    function showError(msg) {
      errorText.textContent = msg;
      errorBanner.style.display = 'flex';
      errorBanner.style.background = 'rgba(239,68,68,.08)';
      errorBanner.style.borderColor = 'rgba(239,68,68,.2)';
      errorBanner.style.color = '#f87171';
    }

    function hideError() { errorBanner.style.display = 'none'; }

    pwToggle.addEventListener('click', function() {
      var hide = passEl.type === 'password';
      passEl.type = hide ? 'text' : 'password';
      eyeOpen.style.display = hide ? 'block' : 'none';
      eyeOff.style.display  = hide ? 'none'  : 'block';
    });

    emailEl.addEventListener('input', hideError);
    passEl.addEventListener('input', hideError);

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      hideError();

      var email    = emailEl.value.trim().toLowerCase();
      var password = passEl.value;

      if (!email || !password) {
        showError('Preencha e-mail e senha para continuar.');
        return;
      }

      setLoading(true);

      sb.auth.signInWithPassword({ email: email, password: password })
        .then(function(result) {
          if (result.error) {
            setLoading(false);
            var msg = result.error.message;
            if (msg === 'Invalid login credentials') {
              showError('E-mail ou senha incorretos.');
            } else {
              showError(msg);
            }
            return;
          }
          /* Verifica se é super admin ou colaborador autorizado */
          var userEmail = result.data.user.email;
          if (userEmail === ADMIN_EMAIL) {
            window.location.href = REDIRECT_ADMIN;
            return;
          }
          sb.from('collaborators').select('role').eq('email', userEmail).maybeSingle()
            .then(function(res) {
              if (res.data) {
                window.location.href = REDIRECT_ADMIN;
              } else {
                sb.auth.signOut();
                setLoading(false);
                showError('Seu e-mail não tem acesso ao painel administrativo.');
              }
            });
        })
        .catch(function() {
          setLoading(false);
          showError('Erro de conexão. Tente novamente.');
        });
    });
  </script>
</body>
</html>
