<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Conectando Google Agenda...</title>
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@700;900&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#050508;color:#F7F7F7;font-family:'Red Hat Display',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh}
    .wrap{text-align:center;padding:32px}
    .spinner{width:40px;height:40px;border:3px solid rgba(112,34,187,0.2);border-top-color:#7022BB;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 24px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .msg{font-weight:700;font-size:15px;color:rgba(247,247,247,0.6)}
    .err{color:#f87171;font-size:13px;margin-top:12px}
  </style>
</head>
<body>
<div class="wrap">
  <div class="spinner" id="sp"></div>
  <div class="msg" id="msg">Conectando Google Agenda...</div>
  <div class="err" id="err"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL  = 'https://subsagwkktjjujdfpavf.supabase.co';
const SUPABASE_ANON = 'sb_publishable_Ln7neAZZMFVZ_yHU64DHHg_QV4ubdDy';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

async function run() {
  const params = new URLSearchParams(window.location.search);
  const code   = params.get('code');
  const errParam = params.get('error');

  if (errParam || !code) {
    document.getElementById('sp').style.display  = 'none';
    document.getElementById('msg').textContent   = 'Conexão cancelada.';
    document.getElementById('err').textContent   = errParam || 'Código não encontrado.';
    setTimeout(() => window.location.replace('/dashboard'), 2500);
    return;
  }

  try {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.replace('/login'); return; }

    const res = await fetch(`${SUPABASE_URL}/functions/v1/google-oauth`, {
      method:  'POST',
      headers: {
        'Content-Type':  'application/json',
        'Authorization': `Bearer ${session.access_token}`,
      },
      body: JSON.stringify({ code }),
    });
    const json = await res.json();

    if (json.error) throw new Error(json.error);

    document.getElementById('sp').style.display  = 'none';
    document.getElementById('msg').textContent   = '✓ Google Agenda conectado! Redirecionando...';
    // Redireciona para admin se for o mentor, senão para o dashboard
    const { data: { session: sess } } = await sb.auth.getSession();
    const dest = sess?.user?.email === 'academy@eternityholding.com' ? '/admin?calendar=connected' : '/dashboard?calendar=connected';
    setTimeout(() => window.location.replace(dest), 1500);
  } catch (e) {
    document.getElementById('sp').style.display = 'none';
    document.getElementById('msg').textContent  = 'Erro ao conectar.';
    document.getElementById('err').textContent  = e.message;
    setTimeout(() => window.location.replace('/dashboard'), 3000);
  }
}

run();
</script>
</body>
</html>
