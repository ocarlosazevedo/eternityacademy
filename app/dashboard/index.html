  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #050508; --white: #F7F7F7; --dp: #2F054C; --purple: #7022BB;
      --surface: #090909; --card: #111111; --border: rgba(255,255,255,0.08);
      --faint: rgba(255,255,255,0.05); --muted: rgba(247,247,247,0.32);
      --font: 'Red Hat Display', sans-serif;
    }
    html, body { height: 100%; background: var(--black); color: var(--white); font-family: var(--font); -webkit-font-smoothing: antialiased; overflow: hidden; }

    /* ── Layout ── */
    .app { display: flex; height: 100vh; overflow: hidden; }

    /* ── Sidebar ── */
    .sidebar { width: 216px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
    .sb-logo  { padding: 20px 22px; border-bottom: 1px solid var(--border); }
    .sb-user  { padding: 18px 22px; border-bottom: 1px solid var(--border); }
    .sb-name  { font-weight: 700; font-size: 14px; color: var(--white); }
    .sb-plan  { font-size: 10px; color: var(--purple); font-weight: 600; letter-spacing: 0.5px; margin-top: 3px; }
    .sb-nav   { flex: 1; padding: 14px 10px; display: flex; flex-direction: column; gap: 1px; overflow-y: auto; }
    .sb-foot  { padding: 14px 22px; border-top: 1px solid var(--border); color: rgba(247,247,247,0.12); font-size: 9px; letter-spacing: 1px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; cursor: pointer; color: rgba(247,247,247,0.28); font-size: 13px; border-left: 3px solid transparent; transition: all 0.18s; user-select: none; }
    .nav-item:hover { color: rgba(247,247,247,0.55); background: rgba(255,255,255,0.03); }
    .nav-item.active { background: rgba(112,34,187,0.15); color: var(--white); font-weight: 700; border-left-color: var(--purple); }
    .nav-item svg { flex-shrink: 0; }

    /* ── Main ── */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
    .topbar { height: 58px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 28px; flex-shrink: 0; font-size: 12px; color: rgba(247,247,247,0.22); gap: 4px; }
    .topbar strong { color: var(--white); font-weight: 600; }
    .page-wrap { flex: 1; overflow-y: auto; padding: 32px 36px; }

    /* ── Cards ── */
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; }
    .card-20 { border-radius: 20px; }

    /* ── Typography helpers ── */
    .lbl { font-size: 10px; font-weight: 700; letter-spacing: 2.5px; color: rgba(247,247,247,0.35); margin-bottom: 10px; }
    .ph1 { font-weight: 900; font-size: 30px; letter-spacing: -1px; color: var(--white); line-height: 1; margin-bottom: 6px; }
    .sub { color: rgba(247,247,247,0.35); font-size: 13px; }

    /* ── Buttons ── */
    .btn-p { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 8px 16px; border-radius: 9px; font-size: 11px; font-weight: 700; letter-spacing: 0.3px; background: linear-gradient(135deg,var(--dp),var(--purple)); color: var(--white); border: 1px solid var(--purple); cursor: pointer; font-family: var(--font); box-shadow: 0 4px 14px rgba(112,34,187,0.3); transition: transform .15s, box-shadow .15s; white-space: nowrap; }
    .btn-p:hover:not([disabled]) { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(112,34,187,0.42); }
    .btn-p:active:not([disabled]) { transform: translateY(0); }
    .btn-p[disabled] { opacity: 0.38; cursor: not-allowed; }
    .btn-p.full { width: 100%; padding: 12px; border-radius: 12px; font-size: 12px; }
    .btn-p.lg  { padding: 13px 24px; border-radius: 12px; font-size: 13px; font-weight: 900; letter-spacing: 1px; }
    .btn-ghost { display: inline-flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 10px; background: var(--faint); border: 1px solid var(--border); color: var(--muted); cursor: pointer; transition: all .15s; }
    .btn-ghost:hover { background: rgba(255,255,255,0.08); color: var(--white); }
    .btn-outline { display: inline-flex; align-items: center; justify-content: center; gap: 8px; flex: 1; padding: 11px; border-radius: 10px; background: transparent; color: rgba(247,247,247,0.3); border: 1px solid var(--border); cursor: pointer; font-family: var(--font); font-size: 12px; transition: all .15s; }
    .btn-outline:hover { background: rgba(255,255,255,0.04); color: var(--white); }

    /* ── Inputs ── */
    .inp { width: 100%; background: var(--faint); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; color: var(--white); font-size: 13px; font-family: var(--font); font-weight: 500; outline: none; transition: border-color .2s, box-shadow .2s; }
    .inp::placeholder { color: rgba(247,247,247,0.16); }
    .inp:focus { border-color: var(--purple); box-shadow: 0 0 0 3px rgba(112,34,187,0.12); }
    textarea.inp { resize: none; line-height: 1.6; }

    /* ── Progress ── */
    .prog-track { background: rgba(255,255,255,0.06); border-radius: 99px; overflow: hidden; }
    .prog-fill  { background: linear-gradient(90deg,var(--dp),var(--purple)); border-radius: 99px; height: 100%; transition: width .6s ease; }

    /* ── Calendar ── */
    .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; }
    .cal-cell { min-height: 72px; border-radius: 12px; padding: 10px 10px 8px; background: var(--card); border: 1px solid var(--border); transition: all .15s; }
    .cal-cell.avail { cursor: pointer; }
    .cal-cell.avail:hover { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.18); }
    .cal-cell.sel { background: rgba(112,34,187,0.15); border-color: var(--purple); }
    .cal-cell.empty { opacity: 0; pointer-events: none; }
    .cal-day  { font-size: 13px; font-weight: 500; color: rgba(247,247,247,0.35); margin-bottom: 6px; }
    .cal-cell.sel .cal-day { color: var(--white); font-weight: 700; }
    .cal-pill { display: inline-flex; align-items: center; gap: 3px; border-radius: 6px; padding: 3px 8px; font-size: 9px; font-weight: 700; }
    .cal-pill.av { background: rgba(112,34,187,0.2); color: var(--purple); }
    .cal-cell.sel .cal-pill.av { background: var(--purple); color: var(--white); }
    .cal-pill.bl { background: rgba(255,255,255,0.04); color: rgba(247,247,247,0.2); }
    .slot-btn { padding: 10px 18px; border-radius: 10px; cursor: pointer; font-size: 13px; border: 1px solid var(--border); transition: all .15s; display: inline-flex; align-items: center; gap: 6px; color: rgba(247,247,247,0.35); background: var(--faint); font-weight: 500; }
    .slot-btn.active { background: var(--purple); border-color: var(--purple); color: var(--white); font-weight: 700; }
    .slot-btn:hover:not(.active) { background: rgba(112,34,187,0.15); border-color: rgba(112,34,187,0.3); }

    /* ── Award ── */
    .award-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; transition: transform .2s ease; }
    .award-card:hover { transform: translateY(-2px); }

    /* ── Modal ── */
    .overlay { position: fixed; inset: 0; background: rgba(5,5,8,0.94); display: flex; align-items: center; justify-content: center; z-index: 200; backdrop-filter: blur(10px); animation: fadeUp .18s ease; }
    .modal   { background: var(--card); border-radius: 24px; padding: 36px; width: 440px; max-width: calc(100vw - 32px); border: 1px solid var(--border); box-shadow: 0 32px 80px rgba(0,0,0,0.85); animation: scaleIn .22s ease; }

    /* ── Hw row ── */
    .hw-row { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 14px 18px; display: flex; align-items: center; gap: 14px; cursor: pointer; transition: all .18s; }
    .hw-row:hover { background: rgba(255,255,255,0.04); }
    .hw-check { width: 20px; height: 20px; border-radius: 6px; flex-shrink: 0; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; transition: all .2s; }
    .hw-check.done { background: #22c55e; border-color: #22c55e; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }
    input, textarea { font-family: var(--font); }

    /* ── Mobile topbar ── */
    .mob-top { display:none; }

    /* ── Drawer ── */
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    .drw-overlay { display:none; position:fixed; inset:0; z-index:150; background:rgba(0,0,0,0.75); backdrop-filter:blur(6px); }
    .drw-overlay.open { display:block; animation:fadeIn .2s ease; }
    .drw { position:fixed; top:0; left:0; bottom:0; z-index:200; width:78%; max-width:300px; background:#0e0e0e; border-right:1px solid var(--border); display:flex; flex-direction:column; transform:translateX(-100%); transition:transform .28s cubic-bezier(.4,0,.2,1); will-change:transform; }
    .drw.open { transform:translateX(0); }
    .drw-item { display:flex; align-items:center; gap:14px; padding:13px 14px; border-radius:12px; cursor:pointer; border-left:3px solid transparent; transition:all .15s; }
    .drw-item.active { background:rgba(112,34,187,0.14); border-left-color:var(--purple); }
    .drw-icon { width:34px; height:34px; border-radius:9px; flex-shrink:0; background:rgba(255,255,255,0.04); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; }
    .drw-item.active .drw-icon { background:rgba(112,34,187,0.2); border-color:var(--purple); }

    /* ── Mobile overrides ── */
    @media (max-width: 768px) {
      html, body { overflow:hidden; }
      .sidebar { display:none; }
      .topbar  { display:none; }
      .mob-top { display:flex; align-items:center; justify-content:center; position:sticky; top:0; z-index:100; background:rgba(9,9,9,0.97); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); padding:14px 20px; flex-shrink:0; }
      .page-wrap { padding:16px 16px 40px; }
      .cal-cell { min-height:46px; padding:6px 4px 4px; }
      .cal-day  { font-size:12px; }
      .cal-pill { display:none; }
      .modal { border-radius:20px 20px 0 0 !important; width:100% !important; max-width:100% !important; position:fixed !important; bottom:0 !important; left:0 !important; right:0 !important; max-height:85vh; overflow-y:auto; padding:24px 20px 40px !important; }
      .overlay { align-items:flex-end !important; }
      input, textarea, select { font-size:16px; }
    }

    /* ── Animations ── */
    @keyframes fadeUp   { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes scaleIn  { from { transform:scale(0.93); opacity:0; } to { transform:scale(1); opacity:1; } }
    @keyframes glow     { 0%,100%{box-shadow:0 0 30px rgba(112,34,187,.4)}50%{box-shadow:0 0 60px rgba(112,34,187,.7)} }
    @keyframes spin     { to { transform:rotate(360deg); } }

    .fu1 { animation: fadeUp .3s ease .06s both; }
    .fu2 { animation: fadeUp .3s ease .12s both; }
    .fu3 { animation: fadeUp .3s ease .18s both; }
  </style>
</head>

/* ─── Disponibilidade real ─────────────────────────────────────────── */
async function loadAvailability() {
  S.cal.loadingAvail = true;
  S.cal.sel = null; S.cal.slot = null;
  document.getElementById('pc').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:center;height:300px;gap:12px;color:rgba(247,247,247,.3);font-size:13px">
      <div style="width:18px;height:18px;border:2px solid rgba(112,34,187,.3);border-top-color:#7022BB;border-radius:50%;animation:spin .7s linear infinite"></div>
      Carregando disponibilidade...
    </div>`;
  try {
    const {data:{session}} = await SB.auth.getSession();
    // Busca disponibilidade configurada (slots + bloqueios)
    const [availRes, busyRes] = await Promise.allSettled([
      fetch(`${SUPABASE_FN}/get-availability`, {
        method: 'POST',
        headers: { 'Content-Type':'application/json', 'Authorization':`Bearer ${session.access_token}` },
        body: JSON.stringify({ year: S.cal.yr, month: S.cal.mo }),
      }),
      // Busca horários ocupados no Google Agenda do mentor
      fetch(`${SUPABASE_FN}/google-calendar`, {
        method: 'POST',
        headers: { 'Content-Type':'application/json', 'Authorization':`Bearer ${session.access_token}` },
        body: JSON.stringify({
          action: 'busy',
          timeMin: new Date(S.cal.yr, S.cal.mo, 1).toISOString(),
          timeMax: new Date(S.cal.yr, S.cal.mo + 1, 0, 23, 59).toISOString(),
        }),
      }),
    ]);

    if (availRes.status === 'fulfilled') {
      const json = await availRes.value.json();
      if (json.availability) S.cal.availability = json.availability;
    }

    // Remove slots que já estão ocupados no Google Agenda
    if (busyRes.status === 'fulfilled') {
      const bj = await busyRes.value.json();
      if (bj.busy?.length) {
        const avail = S.cal.availability;
        for (const { start, end } of bj.busy) {
          const busyStart = new Date(start);
          const busyEnd   = new Date(end);
          for (const dateKey of Object.keys(avail)) {
            avail[dateKey] = avail[dateKey].filter((slot) => {
              const [hh, mm] = slot.split(':');
              const slotDate = new Date(dateKey);
              slotDate.setHours(+hh, +mm, 0, 0);
              return slotDate < busyStart || slotDate >= busyEnd;
            });
            if (!avail[dateKey].length) delete avail[dateKey];
          }
        }
      }
    }
  } catch(_) { /* mantém disponibilidade anterior */ }
  S.cal.loadingAvail = false;
  document.getElementById('pc').innerHTML = pageCal();
  lucide.createIcons();
}

  while(cells.length%7!==0) cells.push(null);
  const dayAvail = d => d ? (availability[`${yr}-${pad(mo+1)}-${pad(d)}`]||[]) : [];
  const selSlots = sel ? dayAvail(sel) : [];
  return `

      <div style="display:flex;gap:8px;margin-top:4px">
        <button data-action="prev-mo" class="btn-ghost">${ic('chevron-left',16)}</button>
        <button data-action="next-mo" class="btn-ghost">${ic('chevron-right',16)}</button>
      </div>
    </div>

    <!-- Weekdays -->
    <div class="cal-grid" style="margin-bottom:4px">
      ${WDAYS.map(d=>`<div style="text-align:center;color:rgba(247,247,247,.18);font-size:9px;font-weight:700;letter-spacing:2px;padding:6px 0">${d}</div>`).join('')}
    </div>

    <!-- Grid -->
    <div class="cal-grid">
      ${cells.map((day,i)=>{
        if(!day) return `<div class="cal-cell empty"></div>`;
        const slots=dayAvail(day), av=slots.length>0, isSel=sel===day;
        return `<div class="cal-cell${av?' avail':''}${isSel?' sel':''}" ${av?`data-action="sel-day" data-v="${day}"`:''} style="animation:fadeUp .28s ease ${(i%7)*.022}s both">
          <div class="cal-day">${day}</div>
          ${av?`<div class="cal-pill av">${ic('check',8)} ${slots.length}h</div>`:''}
        </div>`;
      }).join('')}
    </div>

    <!-- Legenda -->
    <div style="display:flex;gap:16px;margin-top:12px;font-size:10px;color:rgba(247,247,247,.28)">
      <div style="display:flex;align-items:center;gap:5px"><div style="width:8px;height:8px;border-radius:50%;background:#7022BB"></div>Disponível</div>
      <div style="display:flex;align-items:center;gap:5px"><div style="width:8px;height:8px;border-radius:50%;background:rgba(247,247,247,.15)"></div>Indisponível</div>
    </div>

    <!-- Slots -->
    ${sel&&selSlots.length?`
    <div class="card" style="margin-top:18px;padding:20px 22px;animation:scaleIn .22s ease">
      <div style="font-weight:800;font-size:13px;color:#F7F7F7;margin-bottom:2px">Horários — ${pad(sel)} de ${MONTHS[mo]}</div>
      <div style="color:rgba(247,247,247,.28);font-size:11px;margin-bottom:14px">Escolha o melhor horário</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        ${selSlots.map(s=>`<div class="slot-btn${slot===s?' active':''}" data-action="sel-slot" data-v="${s}">${ic('clock',12)} ${s}</div>`).join('')}
      </div>
      ${slot?`<button data-action="open-book" class="btn-p" style="margin-top:16px;padding:12px 28px;border-radius:12px;font-size:13px;font-weight:900;letter-spacing:.5px">CONFIRMAR AGENDAMENTO ${ic('arrow-right',13)}</button>`:''}
    </div>
    `:''}
  </div>`;
}

/* ═══════════════════════════════════════════════════════════════════════
   PAGE: PROGRESS
═══════════════════════════════════════════════════════════════════════ */
function pageProgress() {
  const regular = CALLS.filter(c=>!c.bonus);
  const bonus   = CALLS.filter(c=>c.bonus);
  const done=CALLS.filter(c=>c.done).length, total=CALLS.length;
  const pct=regular.length>0?Math.round((regular.filter(c=>c.done).length/regular.length)*100):0;
  const allTasks = S.dash.tasks || HW;
  const pInfo = PLAN_INFO[S.dash.plan];

  const callRow = (c,i) => `
    <div style="background:#111;border:1px solid ${c.done?'rgba(34,197,94,.1)':c.sched?'rgba(112,34,187,.2)':'rgba(255,255,255,.08)'};border-radius:14px;padding:15px 18px;display:flex;align-items:center;gap:16px;opacity:${c.done?.55:1};animation:fadeUp .3s ease ${i*.04}s both">
      <div style="width:36px;height:36px;border-radius:50%;flex-shrink:0;background:${c.done?'rgba(34,197,94,.12)':c.sched?'linear-gradient(135deg,#2F054C,#7022BB)':'rgba(255,255,255,.04)'};border:2px solid ${c.done?'#22c55e':c.sched?'#7022BB':'rgba(255,255,255,.1)'};display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:${c.done?'#22c55e':c.sched?'#F7F7F7':'rgba(247,247,247,.2)'}">
        ${c.done?`<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M4 12 9 17 19 7"/></svg>`:c.id}
      </div>
      <div style="flex:1">
        <div style="font-weight:700;font-size:13px;color:${c.done?'rgba(247,247,247,.3)':'#F7F7F7'};text-decoration:${c.done?'line-through':'none'};margin-bottom:3px">${c.title}</div>
        <div style="display:flex;gap:12px;align-items:center">
          <span style="font-size:10px;color:rgba(247,247,247,.28)">com ${c.mentor}</span>
          ${c.done&&c.date?`<span style="font-size:10px;color:rgba(34,197,94,.6);display:flex;align-items:center;gap:3px"><svg viewBox="0 0 24 24" width="9" height="9" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M4 12 9 17 19 7"/></svg>${c.date}</span>`:''}
          ${c.sched&&c.schedDate?`<span style="font-size:10px;color:#7022BB;font-weight:600;display:flex;align-items:center;gap:3px">${ic('calendar-days',9)} ${c.schedDate} · ${c.schedTime}</span>`:''}
        </div>
      </div>
      <div style="font-size:9px;font-weight:700;letter-spacing:.5px;padding:4px 10px;border-radius:8px;background:${c.done?'rgba(34,197,94,.1)':c.sched?'rgba(112,34,187,.15)':'rgba(255,255,255,.04)'};color:${c.done?'#22c55e':c.sched?'#7022BB':'rgba(247,247,247,.2)'};border:1px solid ${c.done?'rgba(34,197,94,.2)':c.sched?'rgba(112,34,187,.25)':'rgba(255,255,255,.06)'}">${c.done?'CONCLUÍDA':c.sched?'AGENDADA':'PENDENTE'}</div>
    </div>`;

  return `
  <div style="padding:32px 36px">
    <div class="fu" style="margin-bottom:28px">
      <div class="lbl">PROGRESSO</div>
      <h1 class="ph1">Suas Calls</h1>
      <p class="sub">${pInfo ? `Plano ${pInfo.label} · ${pInfo.sub}` : regular.length>0 ? `${regular.filter(c=>c.done).length} de ${regular.length} calls concluídas` : 'Sua mentoria começa com o primeiro agendamento'}</p>
    </div>

    <!-- Progress bar -->
    <div class="card fu1" style="padding:16px 20px;margin-bottom:28px">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px">
        <span style="font-size:12px;color:#F7F7F7;font-weight:700">Progresso Geral</span>
        <span style="font-size:12px;color:#F7F7F7;font-weight:800">${pct}%</span>
      </div>
      <div class="prog-track" style="height:8px"><div class="prog-fill" style="width:${pct}%"></div></div>
      <div style="display:flex;gap:20px;margin-top:10px">
        ${[{l:'Concluídas',v:done,c:'#22c55e'},{l:'Agendadas',v:CALLS.filter(c=>c.sched).length,c:'#7022BB'},{l:'Pendentes',v:CALLS.filter(c=>!c.done&&!c.sched).length,c:'rgba(247,247,247,.28)'}].map(s=>`
          <div style="display:flex;align-items:center;gap:6px">
            <div style="width:8px;height:8px;border-radius:50%;background:${s.c}"></div>
            <span style="font-size:11px;color:rgba(247,247,247,.35)">${s.v} ${s.l}</span>
          </div>
        `).join('')}
      </div>
    </div>

    <!-- Call list -->
    <div style="display:flex;flex-direction:column;gap:8px">
      ${regular.length === 0 && bonus.length === 0
        ? `<div style="background:#111;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:28px;text-align:center;color:rgba(247,247,247,.2);font-size:13px;display:flex;flex-direction:column;align-items:center;gap:10px">
            ${ic('calendar-days',24)}
            <span>Nenhuma call registrada ainda.<br>Agende sua primeira call para começar.</span>
            <button data-action="nav" data-page="calendar" class="btn-p" style="margin-top:4px;font-size:11px">Agendar Call</button>
          </div>`
        : regular.map((c,i) => callRow(c,i)).join('')}
    </div>

    ${bonus.length > 0 ? `
    <!-- Bônus -->
    <div style="margin-top:24px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
        <div style="height:1px;flex:1;background:linear-gradient(90deg,rgba(245,158,11,.3),transparent)"></div>
        <div style="font-size:9px;font-weight:800;letter-spacing:2.5px;color:#f59e0b;display:flex;align-items:center;gap:6px">
          <svg viewBox="0 0 24 24" width="11" height="11" fill="#f59e0b"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>
          BÔNUS
          <svg viewBox="0 0 24 24" width="11" height="11" fill="#f59e0b"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>
        </div>
        <div style="height:1px;flex:1;background:linear-gradient(90deg,transparent,rgba(245,158,11,.3))"></div>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px">
        ${bonus.map((c,i) => callRow(c, regular.length+i)).join('')}
      </div>
    </div>` : ''}

    <!-- Tarefas -->
    <div style="margin-top:32px">
      <div class="lbl" style="margin-bottom:16px">TAREFAS DE EXECUÇÃO</div>
      <div style="display:flex;flex-direction:column;gap:8px">
        ${allTasks.length === 0
          ? `<div style="background:#111;border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:18px;text-align:center;color:rgba(247,247,247,.2);font-size:13px;display:flex;align-items:center;justify-content:center;gap:8px">${ic('check-square',14)} Nenhuma tarefa atribuída ainda</div>`
          : allTasks.map((h,i)=>`
            <div style="background:#111;border:1px solid ${h.done?'rgba(34,197,94,.1)':'rgba(255,255,255,.08)'};border-radius:12px;padding:13px 18px;display:flex;align-items:center;gap:14px;opacity:${h.done?.45:1};animation:fadeUp .3s ease ${i*.04}s both">
              <div style="width:20px;height:20px;border-radius:6px;flex-shrink:0;background:${h.done?'rgba(34,197,94,.15)':'transparent'};border:2px solid ${h.done?'#22c55e':'rgba(255,255,255,.12)'};display:flex;align-items:center;justify-content:center">
                ${h.done?`<svg viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round"><path d="M4 12 9 17 19 7"/></svg>`:''}
              </div>
              <div style="flex:1">
                <div style="font-weight:600;font-size:13px;color:${h.done?'rgba(247,247,247,.28)':'#F7F7F7'};text-decoration:${h.done?'line-through':'none'};margin-bottom:2px">${h.title}</div>
                <div style="font-size:10px;color:rgba(247,247,247,.25)">${h.call_number??h.call?`Call ${h.call_number??h.call}`:''} ${h.mentor_note??h.mentor?`· ${h.mentor_note??h.mentor}`:''}</div>
              </div>
              <div style="font-size:9px;font-weight:700;padding:3px 8px;border-radius:6px;background:${h.done?'rgba(34,197,94,.08)':'rgba(255,255,255,.04)'};color:${h.done?'#22c55e':'rgba(247,247,247,.2)'};border:1px solid ${h.done?'rgba(34,197,94,.15)':'rgba(255,255,255,.06)'}">${h.done?'FEITO':'PENDENTE'}</div>
            </div>
          `).join('')}
      </div>
    </div>
  </div>`;
}

          <div style="font-size:11px;color:rgba(247,247,247,.6);margin-top:6px">${pInfo.sub}</div>
          <div style="margin-top:12px;display:flex;align-items:center;gap:8px">
            <div style="font-size:9px;font-weight:700;padding:4px 10px;border-radius:8px;background:rgba(34,197,94,.2);color:#22c55e;border:1px solid rgba(34,197,94,.3)">ATIVO</div>
            <div style="font-size:10px;color:rgba(247,247,247,.4)">${pInfo.calls} calls incluídas</div>
          </div>
        </div>`;
      })()}


      <!-- E-mail -->
      <div class="card" style="padding:22px 24px;margin-bottom:16px;border-radius:18px">
        <div style="font-weight:800;font-size:14px;color:#F7F7F7;margin-bottom:20px">E-mail</div>

      <div class="card" style="padding:22px 24px;margin-bottom:16px;border-radius:18px">
        <div style="font-weight:800;font-size:14px;color:#F7F7F7;margin-bottom:20px">Senha</div>

        <input id="cfg-pw" data-input="cfg-pw" type="password" class="inp" placeholder="Mínimo 8 caracteres" value="${pw}" style="margin-bottom:14px"/>

document.addEventListener('click', function(e) {
  const t = e.target.closest('[data-action]');
  if(!t) return;
  const {action, page, id, v} = t.dataset;

  switch(action) {
    case 'open-drawer':
      document.getElementById('drw').classList.add('open');
      document.getElementById('drw-overlay').classList.add('open');
      break;
    case 'close-drawer':
      document.getElementById('drw').classList.remove('open');
      document.getElementById('drw-overlay').classList.remove('open');
      break;
    case 'nav':
      S.page = page;
      document.getElementById('drw').classList.remove('open');
      document.getElementById('drw-overlay').classList.remove('open');
      render();
      break;
    case 'open-task':
      openTaskModal(id);
      break;
    case 'rating':
      S.dash.rating = +v;
      document.getElementById('stars-row').innerHTML = stars(+v);
      break;
    case 'send-fb': {
      if(!S.dash.feedback.trim()) return;
      S.dash.sent = true;
      S.dash.feedbackDone = true;
      const _lastCall = CALLS.filter(c=>c.done).slice(-1)[0];
      if (_lastCall) try { localStorage.setItem('fb_done_' + S.user.id + '_' + (_lastCall.bookingId||_lastCall.id), '1'); } catch(_) {}
      saveFeedback(); // fire-and-forget
      document.getElementById('pc').innerHTML = pageDash();
      lucide.createIcons();
      break;
    }
    case 'prev-mo':
      if(S.cal.mo===0){S.cal.mo=11;S.cal.yr--;}else S.cal.mo--;
      loadAvailability();
      break;
    case 'next-mo':
      if(S.cal.mo===11){S.cal.mo=0;S.cal.yr++;}else S.cal.mo++;
      loadAvailability();
      break;
    case 'sel-day':
      S.cal.sel = +v; S.cal.slot = null;
      document.getElementById('pc').innerHTML = pageCal();
      lucide.createIcons();
      break;
    case 'sel-slot':
      S.cal.slot = v;
      document.getElementById('pc').innerHTML = pageCal();
      lucide.createIcons();
      break;
    case 'open-book':
      openBookModal();
      break;
    case 'close-book':
      document.getElementById('mr').innerHTML = '';
      break;
    case 'confirm-book':
      renderBookModal(true);
      createBooking();
      break;
    case 'connect-gcal':
      connectGoogleCalendar();
      break;
    case 'open-award':
      // awards are locked for now — no-op
      break;
    case 'kiwify':
      t.innerHTML = `<span style="display:inline-block;width:16px;height:16px;border:2px solid rgba(247,247,247,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;margin-right:8px"></span>Abrindo Kiwify...`;
      t.disabled=true;
      setTimeout(()=>{ window.open('https://members.kiwify.com.br','_blank'); t.innerHTML=`ACESSAR CONTEÚDOS GRAVADOS ${ic('external-link',14)}`; t.disabled=false; }, 900);
      break;
    case 'save-cfg':
      saveCfg(id);
      break;
    case 'signout':
      SB.auth.signOut().then(()=>{ window.location.href='/login'; });
      break;
  }
});

/* ─── Calls → Supabase ─────────────────────────────────────────────── */
async function loadCalls() {
  try {
    const { data } = await SB.from('bookings')
      .select('id, scheduled_at, call_title, call_number, status')
      .eq('student_id', S.user.id)
      .neq('status', 'cancelled')
      .order('scheduled_at');
    CALLS.length = 0;
    const now  = new Date();
    const pad2 = n => String(n).padStart(2,'0');
    const fmtD = dt => { const d=new Date(dt); return `${pad2(d.getDate())}/${pad2(d.getMonth()+1)}/${d.getFullYear()}`; };
    const fmtT = dt => { const d=new Date(dt); return `${pad2(d.getHours())}:${pad2(d.getMinutes())}`; };

    const bookings = data || [];
    // Map booking by call_number
    const byNum = {};
    bookings.forEach((b, i) => { const n = b.call_number || (i+1); if (!byNum[n]) byNum[n] = b; });

    const template = PLAN_CALLS[S.dash.plan];
    if (template) {
      template.forEach(t => {
        const b = byNum[t.num];
        if (b) {
          const isPast = new Date(b.scheduled_at) < now;
          CALLS.push({ id:t.num, title:b.call_title||t.title, mentor:'Eternity Academy',
            done:isPast&&b.status==='confirmed', sched:!isPast,
            date:isPast?fmtD(b.scheduled_at):null, schedDate:!isPast?fmtD(b.scheduled_at):null,
            schedTime:!isPast?fmtT(b.scheduled_at):null,
            bookingId:b.id, scheduledAt:b.scheduled_at, bonus:t.bonus||false });
        } else {
          CALLS.push({ id:t.num, title:t.title, mentor:'Eternity Academy',
            done:false, sched:false, date:null, schedDate:null, schedTime:null,
            bookingId:null, scheduledAt:null, bonus:t.bonus||false });
        }
      });
    } else {
      // Sem plano definido: mostra apenas bookings reais
      bookings.forEach((b, i) => {
        const isPast = new Date(b.scheduled_at) < now;
        CALLS.push({ id:b.call_number||(i+1), title:b.call_title||'Call de Mentoria', mentor:'Eternity Academy',
          done:isPast&&b.status==='confirmed', sched:!isPast,
          date:isPast?fmtD(b.scheduled_at):null, schedDate:!isPast?fmtD(b.scheduled_at):null,
          schedTime:!isPast?fmtT(b.scheduled_at):null,
          bookingId:b.id, scheduledAt:b.scheduled_at, bonus:false });
      });
    }
  } catch(e) { console.warn('loadCalls:', e); }
}

/* ─── Feedback status ──────────────────────────────────────────────── */
async function loadFeedbackStatus() {
  try {
    const lastCall = CALLS.filter(c => c.done).slice(-1)[0];
    if (!lastCall) return;
    // Check localStorage first (instant, no network)
    const lsKey = 'fb_done_' + S.user.id + '_' + (lastCall.bookingId || lastCall.id);
    if (localStorage.getItem(lsKey)) { S.dash.feedbackDone = true; return; }
    // Fallback: check Supabase for any feedback after this call's scheduled time
    const { data } = await SB.from('feedbacks')
      .select('id')
      .eq('student_id', S.user.id)
      .gte('created_at', lastCall.scheduledAt)
      .limit(1);
    if (data && data.length > 0) {
      S.dash.feedbackDone = true;
      try { localStorage.setItem(lsKey, '1'); } catch(_) {}
    }
  } catch(e) { /* silencioso */ }
}

async function createBooking() {
  const { sel, slot, yr, mo, form } = S.cal;
  const nextCall = CALLS.filter(c => !c.done && !c.sched)[0];
  const callTitle  = nextCall ? nextCall.title : 'Call de Mentoria';
  const callNumber = nextCall ? nextCall.id : null;

  // Fecha modal e recarrega calendário após 2.8s
  setTimeout(async () => {
    document.getElementById('mr').innerHTML = '';
    S.cal.sel=null; S.cal.slot=null; S.cal.form={name:'',email:'',topic:''};
    await Promise.all([loadCalls(), loadAvailability()]); // recarrega slots e calls
  }, 2800);

  try {
    const { data: { session } } = await SB.auth.getSession();
    if (!session) return;

    // Monta datas no formato ISO com fuso de Brasília
    const dateStr = `${yr}-${pad(mo+1)}-${pad(sel)}`;
    const [hh, mm] = slot.split(':');
    const startAt  = `${dateStr}T${hh}:${mm}:00-03:00`;

    // Insere booking diretamente no Supabase (RLS permite aluno inserir o próprio)
    const { data: inserted, error: insErr } = await SB.from('bookings').insert({
      student_id:   session.user.id,
      mentor_email: MENTOR_EMAIL,
      call_number:  callNumber,
      call_title:   callTitle,
      scheduled_at: startAt,
      status:       'confirmed',
    }).select('id').single();

    if (insErr) { console.warn('Booking insert error:', insErr.message); return; }

    // Cria evento no Google Agenda do mentor (e convida o aluno)
    try {
      const bookingId  = inserted?.id || null;
      const studentEmail = session.user.email;
      const studentName  = form.name || session.user.user_metadata?.name || 'Aluno';
      const endHour  = String(+hh + 1).padStart(2,'0');
      const endAt    = `${dateStr}T${endHour}:${mm}:00-03:00`;

      const calRes = await fetch(`${SUPABASE_FN}/google-calendar`, {
        method: 'POST',
        headers: { 'Content-Type':'application/json', 'Authorization':`Bearer ${session.access_token}` },
        body: JSON.stringify({ action:'create', bookingId, startAt, endAt,
          title: callTitle, studentEmail, studentName }),
      });
      const calJson = await calRes.json();
      if (calJson.error) { console.error('Google Calendar error:', calJson.error); }
      if (calJson.meetLink)  S.gcal.meetLink  = calJson.meetLink;
      if (calJson.eventLink) S.gcal.eventLink = calJson.eventLink;
    } catch(calErr) { console.warn('Google Calendar:', calErr); }

  } catch(e) { console.warn('createBooking:', e); }
}

    const {error}=await SB.auth.updateUser({password:pw});

    S.cfg.pw=''; S.cfg.pwConf='';

    const em=document.getElementById('cfg-email')?.value||'';
    if(!em) return;
    const {error}=await SB.auth.updateUser({email:em});
    if(error){alert('Erro: '+error.message);return;}
  }
  S.cfg.saved=id;
  document.getElementById('pc').innerHTML=pageConfig();
  lucide.createIcons();
  setTimeout(()=>{S.cfg.saved=''; document.getElementById('pc').innerHTML=pageConfig(); lucide.createIcons();}, 2200);
}

   INIT — auth guard
═══════════════════════════════════════════════════════════════════════ */
SB.auth.getSession().then(async function({data:{session}}) {
  if(!session) {
    window.location.replace('/login');
    return;
  }
  S.user = session.user;
  // Verificar se veio do callback de conexão
  if(new URLSearchParams(window.location.search).get('calendar')==='connected') {
    S.gcal.connected = true;
    history.replaceState(null,'','/dashboard');
    S.page = 'config';
  }
  // Plano precisa ser carregado antes das calls
  await loadSupportPhone();
  // Carregar dados em paralelo
  await Promise.all([
    checkGCalConnected(),
    loadDashTasks(),
    upsertProfile(session.user),
    loadCalls(),
  ]);
  await loadFeedbackStatus();
  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='flex';
  render();
});

SB.auth.onAuthStateChange(function(event, session) {
  if(event==='SIGNED_OUT') window.location.replace('/login');
});
</script>
</body>
</html>
