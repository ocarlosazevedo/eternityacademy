<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Carlos Azevedo</title>
    <link rel="icon" type="image/png" href="../medias/eternityfavicon.png">
    <meta name="description" content="Carlos Azevedo — Links oficiais.">
    <meta property="og:title" content="Carlos Azevedo">
    <meta property="og:description" content="Redes sociais e parceiros oficiais.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #000000;
            --text: #ffffff;
            --text-muted: #797979;
            --surface: rgba(255,255,255,0.035);
            --surface-hover: rgba(255,255,255,0.07);
            --border: rgba(255,255,255,0.06);
            --border-hover: rgba(255,255,255,0.13);
            --whatsapp: #25d366;
        }

        html {
            -webkit-tap-highlight-color: transparent;
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            min-height: 100dvh;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow-x: hidden;
        }

        .page {
            width: 100%;
            max-width: 420px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100dvh;
        }

        /* Hero — foto grande com fade */
        .hero {
            width: 100%;
            position: relative;
        }

        .hero img {
            width: 100%;
            display: block;
            object-fit: cover;
        }

        .hero::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(to bottom, transparent, var(--bg));
            pointer-events: none;
        }

        /* Info */
        .info {
            text-align: center;
            margin-top: -5rem;
            position: relative;
            z-index: 1;
        }

        .info h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.3px;
            line-height: 1.2;
        }

        .info p {
            font-size: 0.85rem;
            font-weight: 400;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        /* Ícones sociais */
        .socials {
            display: flex;
            align-items: center;
            gap: 1.25rem;
            margin-top: 1.25rem;
            position: relative;
            z-index: 1;
        }

        .socials a {
            color: var(--text);
            transition: opacity 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .socials a:active {
            opacity: 0.6;
        }

        .socials a svg {
            width: 28px;
            height: 28px;
            fill: var(--text);
            display: block;
            overflow: visible;
        }

        /* Seção parceiros */
        .section-label {
            width: 100%;
            padding: 0 1.25rem;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-top: 1.25rem;
        }

        .links {
            width: 100%;
            padding: 0 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 0.625rem;
            margin-top: 0.75rem;
        }

        .link-card {
            display: flex;
            align-items: center;
            gap: 0.875rem;
            width: 100%;
            padding: 0.875rem 1rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            text-decoration: none;
            color: var(--text);
            transition: background 0.25s ease, border-color 0.25s ease, transform 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .link-card:active {
            transform: scale(0.97);
            background: var(--surface-hover);
        }

        @media (hover: hover) {
            .link-card:hover {
                background: var(--surface-hover);
                border-color: var(--border-hover);
            }
            .link-card:hover .link-arrow { color: #555; transform: translateX(2px); }
        }

        .link-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            background: #ffffff;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
            padding: 6px;
        }

        .link-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .link-text {
            display: flex;
            flex-direction: column;
            gap: 0.1rem;
            min-width: 0;
            flex: 1;
        }

        .link-text span {
            font-size: 0.85rem;
            font-weight: 700;
            line-height: 1.3;
        }

        .link-text small {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-weight: 400;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .link-text .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 0.6rem;
            font-weight: 700;
            color: var(--whatsapp);
            margin-top: 1px;
        }

        .badge svg {
            width: 10px;
            height: 10px;
            fill: var(--whatsapp);
        }

        .link-arrow {
            margin-left: auto;
            flex-shrink: 0;
            color: #282828;
            transition: color 0.25s, transform 0.25s;
        }

        /* Footer logo */
        .footer {
            margin-top: auto;
            padding: 3rem 0 2.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        .footer img {
            width: 52px;
            height: auto;
            opacity: 0.7;
        }

        .footer span {
            font-size: 0.55rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        @media (max-width: 380px) {
            .info h1 { font-size: 1.3rem; }
            .link-icon { width: 40px; height: 40px; border-radius: 10px; padding: 5px; }
            .link-text span { font-size: 0.8rem; }
        }
    </style>
</head>
