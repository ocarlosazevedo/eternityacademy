<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#020206">
    <title>Eternity Academy</title>
    <link rel="icon" type="image/png" href="medias/eternityfavicon.png">
    <meta name="description" content="Algo eterno está por vir.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #020206;
            color: #fff;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            cursor: default;
        }

        /* Canvas principal */
        #cosmos {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        /* Conteúdo */
        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.8rem;
            padding: 2rem;
        }

        /* Símbolo do infinito - SVG animado */
        .infinity-wrap {
            width: 80px;
            height: 40px;
            animation: fadeIn 3s ease both;
        }

        .infinity-wrap svg {
            width: 100%;
            height: 100%;
        }

        .infinity-path {
            fill: none;
            stroke: url(#infinityGrad);
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-dasharray: 300;
            stroke-dashoffset: 300;
            animation: drawInfinity 4s ease forwards, glowPulse 4s ease-in-out 4s infinite;
            filter: drop-shadow(0 0 6px rgba(140, 100, 255, 0.3));
        }

        @keyframes drawInfinity {
            to { stroke-dashoffset: 0; }
        }

        @keyframes glowPulse {
            0%, 100% { filter: drop-shadow(0 0 4px rgba(140, 100, 255, 0.2)); opacity: 0.6; }
            50% { filter: drop-shadow(0 0 12px rgba(140, 100, 255, 0.5)); opacity: 1; }
        }

        /* Título */
        .title h1 {
            font-size: clamp(1.6rem, 5vw, 2.5rem);
            font-weight: 700;
            letter-spacing: 8px;
            text-transform: uppercase;
            background: linear-gradient(180deg, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.35) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0;
            animation: revealTitle 2.5s ease 1s both;
        }

        @keyframes revealTitle {
            0% { opacity: 0; letter-spacing: 30px; filter: blur(12px); }
            100% { opacity: 1; letter-spacing: 8px; filter: blur(0); }
        }

        .title .divider {
            width: 0;
            height: 1px;
            margin: 0.6rem auto 0;
            background: linear-gradient(90deg, transparent, rgba(140, 100, 255, 0.4), transparent);
            animation: expandLine 1.5s ease 2.5s both;
        }

        @keyframes expandLine {
            to { width: 50px; }
        }

        /* Mensagem principal */
        .message {
            animation: fadeIn 2s ease 3s both;
        }

        .message p {
            font-size: 0.9rem;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.35);
            letter-spacing: 1.5px;
            line-height: 2;
        }

        .message .highlight {
            color: rgba(160, 130, 255, 0.8);
            font-weight: 400;
        }

        /* Texto que digita */
        .typewriter {
            font-size: 0.6rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.15);
            font-weight: 300;
            min-height: 1.2em;
            animation: fadeIn 1s ease 4.5s both;
        }

        .typewriter .cursor {
            display: inline-block;
            width: 1px;
            height: 0.7em;
            background: rgba(140, 100, 255, 0.5);
            margin-left: 2px;
            animation: cursorBlink 1s step-end infinite;
            vertical-align: middle;
        }

        @keyframes cursorBlink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Hover secreto */
        .secret-trigger {
            position: absolute;
            bottom: -3rem;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(140, 100, 255, 0.15);
            animation: fadeIn 2s ease 6s both, secretPulse 3s ease-in-out 6s infinite;
            cursor: pointer;
            transition: all 0.5s ease;
        }

        .secret-trigger:hover {
            background: rgba(140, 100, 255, 0.6);
            box-shadow: 0 0 20px rgba(140, 100, 255, 0.4);
            transform: scale(2);
        }

        @keyframes secretPulse {
            0%, 100% { opacity: 0.15; }
            50% { opacity: 0.4; }
        }

        /* Footer */
        .footer {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.5rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.06);
            font-weight: 300;
            animation: fadeIn 2s ease 5s both;
            z-index: 2;
        }

        @media (max-width: 480px) {
            .infinity-wrap { width: 60px; height: 30px; }
            .title h1 { letter-spacing: 5px; }
            @keyframes revealTitle {
                0% { opacity: 0; letter-spacing: 15px; filter: blur(8px); }
                100% { opacity: 1; letter-spacing: 5px; filter: blur(0); }
            }
        }
    </style>
</head>
<body>
    <canvas id="cosmos"></canvas>

    <div class="container">
        <!-- Infinito SVG animado -->
        <div class="infinity-wrap">
            <svg viewBox="0 0 80 40" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="infinityGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="rgba(100, 70, 200, 0.6)" />
                        <stop offset="50%" stop-color="rgba(180, 150, 255, 0.8)" />
                        <stop offset="100%" stop-color="rgba(100, 70, 200, 0.6)" />
                    </linearGradient>
                </defs>
                <path class="infinity-path" d="M40 20c0-8.3 6.7-15 15-15s15 6.7 15 15-6.7 15-15 15S40 28.3 40 20c0 8.3-6.7 15-15 15S10 28.3 10 20 16.7 5 25 5s15 6.7 15 15z"/>
            </svg>
        </div>

        <div class="title">
            <h1>Eternity Academy</h1>
            <div class="divider"></div>
        </div>

        <div class="message">
            <p>O que é <span class="highlight">eterno</span> não se anuncia.<br>Se revela.</p>
        </div>

        <div class="typewriter">
            <span id="typed-text"></span><span class="cursor"></span>
        </div>

        <div class="secret-trigger" title="..."></div>
    </div>

    <div class="footer">eternityacademy.com.br</div>

    <script>
    // ===== COSMOS - Partículas e conexões =====
    (function() {
        const canvas = document.getElementById('cosmos');
        const ctx = canvas.getContext('2d');
        let w, h, particles = [], mouse = { x: -1000, y: -1000 };

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // Mouse interativo
        document.addEventListener('mousemove', e => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        document.addEventListener('touchmove', e => {
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
        }, { passive: true });

        // Partículas
        const count = Math.min(100, Math.floor(w * h / 12000));
        for (let i = 0; i < count; i++) {
            particles.push({
                x: Math.random() * w,
                y: Math.random() * h,
                vx: (Math.random() - 0.5) * 0.3,
                vy: (Math.random() - 0.5) * 0.3,
                r: Math.random() * 1.2 + 0.4,
                baseAlpha: Math.random() * 0.5 + 0.15,
                phase: Math.random() * Math.PI * 2,
                speed: Math.random() * 0.008 + 0.003
            });
        }

        function draw(time) {
            ctx.clearRect(0, 0, w, h);

            // Gradiente central sutil
            const cx = w / 2, cy = h / 2;
            const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(w, h) * 0.5);
            grd.addColorStop(0, 'rgba(60, 30, 120, 0.06)');
            grd.addColorStop(0.5, 'rgba(30, 15, 80, 0.03)');
            grd.addColorStop(1, 'transparent');
            ctx.fillStyle = grd;
            ctx.fillRect(0, 0, w, h);

            // Desenhar conexões
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < 120) {
                        const alpha = (1 - dist / 120) * 0.08;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `rgba(140, 100, 255, ${alpha})`;
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }
            }

            // Desenhar partículas
            for (const p of particles) {
                const alpha = p.baseAlpha + Math.sin(time * p.speed + p.phase) * 0.2;

                // Interação com mouse
                const dx = mouse.x - p.x;
                const dy = mouse.y - p.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < 150) {
                    const force = (150 - dist) / 150;
                    p.vx += (dx / dist) * force * 0.02;
                    p.vy += (dy / dist) * force * 0.02;

                    // Linha até o mouse
                    ctx.beginPath();
                    ctx.moveTo(p.x, p.y);
                    ctx.lineTo(mouse.x, mouse.y);
                    ctx.strokeStyle = `rgba(140, 100, 255, ${force * 0.1})`;
                    ctx.lineWidth = 0.3;
                    ctx.stroke();
                }

                // Glow
                const glow = p.r * 4;
                ctx.beginPath();
                ctx.arc(p.x, p.y, glow, 0, Math.PI * 2);
                const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, glow);
                grad.addColorStop(0, `rgba(140, 100, 255, ${alpha * 0.15})`);
                grad.addColorStop(1, 'transparent');
                ctx.fillStyle = grad;
                ctx.fill();

                // Ponto
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${Math.max(0, Math.min(1, alpha))})`;
                ctx.fill();

                // Física
                p.x += p.vx;
                p.y += p.vy;
                p.vx *= 0.99;
                p.vy *= 0.99;

                // Bounce
                if (p.x < 0 || p.x > w) p.vx *= -1;
                if (p.y < 0 || p.y > h) p.vy *= -1;
                p.x = Math.max(0, Math.min(w, p.x));
                p.y = Math.max(0, Math.min(h, p.y));
            }

            requestAnimationFrame(draw);
        }

        requestAnimationFrame(draw);
    })();

    // ===== TYPEWRITER - Frases enigmáticas =====
    (function() {
        const phrases = [
            'A eternidade começa aqui',
            'Você não chegou por acaso',
            'Alguns segredos levam tempo',
            'O infinito está mais perto do que parece',
            'Prepare-se'
        ];

        const el = document.getElementById('typed-text');
        let phraseIdx = 0, charIdx = 0, deleting = false, pause = 0;

        function type() {
            if (pause > 0) { pause--; requestAnimationFrame(type); return; }

            const current = phrases[phraseIdx];

            if (!deleting) {
                el.textContent = current.substring(0, charIdx + 1);
                charIdx++;
                if (charIdx >= current.length) {
                    pause = 180;
                    deleting = true;
                }
            } else {
                el.textContent = current.substring(0, charIdx - 1);
                charIdx--;
                if (charIdx <= 0) {
                    deleting = false;
                    phraseIdx = (phraseIdx + 1) % phrases.length;
                    pause = 40;
                }
            }

            const speed = deleting ? 1 : 3;
            setTimeout(() => requestAnimationFrame(type), deleting ? 30 : 70);
        }

        setTimeout(type, 5000);
    })();

    // ===== SECRET - Easter egg ao clicar no ponto =====
    document.querySelector('.secret-trigger').addEventListener('click', function() {
        this.style.transition = 'all 1s ease';
        this.style.boxShadow = '0 0 60px rgba(140, 100, 255, 0.6)';
        this.style.transform = 'scale(30)';
        this.style.opacity = '0';
        setTimeout(() => {
            this.style.transform = 'scale(1)';
            this.style.boxShadow = '';
            this.style.opacity = '';
        }, 2000);
    });
    </script>
</body>
</html>
